    affiliation: DECHEMA Forschungsinstitut
    background: Team leader; powder metallurgy, gas atomization, additive manufacturing, alloy design, and high-temperature
      corrosion.
  scope: |-
    Refractory metals and traditional refractory metallic alloys (FS-85, Cb-75s, ASTAR 811C) have unique properties that make them essential for various applications and extreme environments. Traditional processing technologies (e.g., forging, rolling, and extrusion) often encounter challenges due to the high processing temperatures and complex microstructural evolutions characteristic of refractory metals and alloys. As a result, alternative techniques such as spark plasma sintering (SPS) and diffusion bonding are sometimes employed to enable consolidation, joining, or microstructural control where conventional routes are limited. Refractory metals used in ballistic, aerospace, and nuclear applications also require additional testing considerations (e.g., high strain rate, time-dependent deformation, irradiation) and protective coatings in high- temperature, oxygen-containing atmospheres to maintain environmental stability and performance.

    This symposium emphasizes non-additive processing, deformation behavior, environmental effects, and application-driven performance of refractory metals and traditional alloys (those not utilizing high entropy) that are outside of our classical superalloy design paradigm. It encourages submissions from government, academia, and industry on topics including:
    •    High-rate deformation, time-dependent deformation, creep, and strain rate sensitivity
    •    Unalloyed refractory metals and traditional refractory metal alloys with emphasis on processing-structure-property relationships outside of additive manufacturing
    •    Joining, consolidation, and advanced non-additive processing routes (e.g., diffusion bonding, SPS, severe plastic deformation)
    •    Mechanical performance under extreme conditions, including combined thermal, mechanical, and environmental loading.
