    background: Materials scientist; CALPHAD thermodynamic database development, phase diagrams, high-entropy alloys, and
      solidification modeling.
  - name: Bin Ouyang
    affiliation: Florida State University
    background: Assistant professor; computational and data-driven discovery of high-entropy ceramics and battery materials,
      phase stability and alloy thermodynamics.
  - name: Andrew K. Hoffman
