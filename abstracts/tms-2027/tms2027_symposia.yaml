symposia:
- id: '001'
  title: Additive Manufacturing and Innovative Feedstock Processing for Multifunctional Materials
  track: Additive Manufacturing
  flyer_url: https://www.tms.org/tms2027/downloads/flyers/TMS2027-CFA-Flyer-001.pdf
  division_sponsors:
  - TMS Functional Materials Division
  committee_sponsors:
  - 'TMS: Additive Manufacturing Committee'
  - 'TMS: Magnetic Materials Committee'
  organizers:
  - name: Daniel Salazar
    affiliation: BCMaterials
    background: Researcher in magnetic materials; permanent magnets, magnetic shape memory alloys, and magnetocaloric materials.
  - name: Markus Chmielus
    affiliation: University of Pittsburgh
    background: Professor of mechanical engineering and materials science; binder-jet additive manufacturing and magnetic
      shape-memory and functional alloys.
  - name: Henry Colorado
    affiliation: Universidad de Antioquia
    background: Professor; composites, cements, waste valorization, natural-fiber materials, and additive manufacturing for
      sustainability.
  - name: Riccardo Casati
    affiliation: Politecnico Di Milano
    background: Professor of metallurgy; alloy design and heat treatment for laser-based additive manufacturing of aluminum
      alloys.
  scope: |-
    Powder and Wire Metallurgy (PW/M) is a commonplace fabrication and processing method for high throughput part production in industrial settings. Additionally, PW/M fabrication and processing advancement also is an essential counterpart to the advancement of additive manufacturing (AM) with powder-based AM methods. Novel and intensive research is ongoing in innovative, traditional, and emerging magnetic materials and functional materials; however, the practical application is limited by the ability to form these typically brittle materials into the shapes that are designed for the applications. At this time, advanced powder synthesis and processing, including additive manufacturing, can provide a way to form these materials into final shapes for applications. The purpose of this symposium is to tie both magnetic and functional materials to advanced powder synthesis and additive manufacturing, as well as other advanced processing approaches and discuss aspects such as process-property relationships, functionality, and/or application performance.

    Magnetic and functional material systems of interest include:
    •  Soft magnets (nano-crystalline alloys, high Si-steel)
    •  Hard magnets (Nd-Fe-B, Sm-Co, MnAlC, MnBi, alnico, ferrite, exchange-coupled)
    •  Magnetocaloric materials (Gd-Si-Ge, Gd-Ni-X, RE-RE, RE-Al)
    •  Magnetic Shape Memory Alloys (Ni-Mn-Ga(-X))
    •  Shape Memory Alloys (NiTi(X), Fe-based, Cu-based)
    •  Magnetostrictive materials (Terfenol-D, Ga-Fe, Gd-Co)
    •  Thermoelectric Materials (Si-Ge, Bi-Te)
    •  Lightweight Structural Materials                                         •   Daniel Salazar, BCMaterials Topics of interest for clean powder and wire synthesis include, but are     •   Henry Colorado, Universidad de Antioquia not limited to:                                                             •   Riccardo Casati, Politecnico Di Milano
    •     Atomization (water, gas, rotational, ultrasonic, plasma)
    •     Mechanical comminution (multi-jet or single jet milling, high energy ball milling)
    •     Extrusion of metals and composites
    •     And other powder and wire synthesis approaches

    Topics of interest for advanced powder processing of magnetic/ functional materials include, but are not limited to: i) additive manufacturing (binder jet, directed energy deposition (DED), colloidal deposition, electron beam melting powder bed fusion (EBM/PBF), laser/powder bed fusion (L-PBF), fused filament fabrication (FFF), Wire Arc Additive Manufacturing (WAAM), atmospheric pressure plasma deposition (APPD) and stereolithography), ii) metal injection and compression molding, iii) spark plasma sintering, iv) vacuum hot pressing, v) Functional post-processing (directional recrystallization, magnetic annealing (large or moderate magnetic fields))
- id: '002'
  title: Additive Manufacturing for Energy Industry
  track: Additive Manufacturing
  flyer_url: https://www.tms.org/tms2027/downloads/flyers/TMS2027-CFA-Flyer-002.pdf
  division_sponsors:
  - TMS Materials Processing and Manufacturing Division
  - TMS Structural Materials Division
  - TMS Extraction and Processing Division
  committee_sponsors:
  - 'TMS: Additive Manufacturing Committee'
  - 'TMS: Corrosion and Environmental Effects Committee'
  - 'TMS: Energy Committee'
  organizers:
  - name: Xiaoyuan Lou
    affiliation: Purdue University
    background: Associate professor of nuclear engineering; metal additive manufacturing, qualification, and environmental
      degradation of alloys for nuclear energy.
  - name: Isabella Van Rooyen
    affiliation: Pacific Northwest National Laboratory
    background: Chief scientist; advanced and additive manufacturing for nuclear energy, nuclear fuels and materials characterization.
  - name: Subhashish Meher
    affiliation: Pacific Northwest National Laboratory
    background: Staff scientist; nickel and cobalt superalloys, microstructure evolution, and printability of alloys in additive
      manufacturing for energy applications.
  - name: Mohan Sai Kiran Nartu
    affiliation: Pacific Northwest National Laboratory
    background: Materials scientist; additive manufacturing of titanium alloys, metal matrix composites, and high-entropy
      alloys; phase transformations.
  - name: Ning Zhou
    affiliation: Carpenter Technology Corporation
    background: Principal R&D metallurgist; CALPHAD-based design of crack-resistant Ni- and Co-base superalloys for additive
      manufacturing.
  - name: Jonah Klemm-Toole
    affiliation: Colorado School of Mines
    background: Assistant professor of metallurgy; welding metallurgy, alloy design, and additive manufacturing of steels
      and superalloys.
  - name: Pin Lu
    affiliation: Solvus Global
    background: Principal technical program manager; computational materials design and additive manufacturing, formerly alloy
      design at QuesTek Innovations.
  scope: |-
    Additive manufacturing (AM) has grown significantly over recent years in energy sectors including power generation and oil & gas industries, due to the advantages of supply chain development, economic and performance enhancements, and cost savings. The examples include the high-temperature components in gas turbines, fuel and structural components in nuclear reactors, and corrosion-resistant off-shore drilling components. Compared to other industries, the energy industry has its unique material and process requirements to be able to deploy AM on commercial scale. Large-scale AM is desired to accommodate the size requirement of the energy infrastructure. The cost-effective choices of materials and processes are of greater consideration in power generation and oil & gas industry due to their lower profit margin than aerospace and healthcare industries. More complicated service environments, ranging from high temperature, corrosive conditions to radiation damages, are often seen in different energy systems. Material performance data across a wide range of environments are needed. Beyond the challenging material and process requirements, the full adoption of AM in all energy sectors is hindered by the lack of available codes and standards. To overcome these challenges, it is essential to develop new materials and processes, gather relevant material data, and advance qualification, inspection, and testing technologies. These efforts are necessary to meet the higher demands of materials in energy environments and enable their wide use in various applications.

    This symposium invites talks focusing on developing, understanding, and qualifying AM materials and manufacturing processes that target the environments specific to energy sectors, including nuclear fission and fusion, oil and gas, natural gas, coal, solar, and wind, etc. To accelerate industry adoption, we welcome talks from the energy industry to cover code/standard development and industry demonstration. We emphasize this symposium will only accept submissions focusing on energy-specific deployment challenges (e.g., development and qualification, reliability, quality control, scale-up, operating conditions, business demonstration). General AM studies without energy industry specific applications is out of scope.

    This symposium will integrate invited and contributed talks in the following categories:
    •    Advanced AM materials and material architectures for energy industries.
    •    Advanced AM process research and development for energy industries.
    •    Material performance and degradation behavior in energy industry environments.
    •    Qualification of AM materials for energy applications.
    •    In-situ monitoring and sensing, inspection and qualify control in energy environments.
    •    Recent progress on code and standard development and industry demonstration of AM in energy sectors.
