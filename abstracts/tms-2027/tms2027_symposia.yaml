    Luo, Ohio State University •    Anand Makwana, Air Products'
  organizers:
  - name: Ramzi Ishak
    affiliation: Alcoa
    background: Senior R&D scientist; aluminum production, carbon anode materials, and casthouse technology.
  - name: Anand Makwana
    affiliation: Air Products
    background: Senior principal research engineer; oxy-fuel combustion, hydrogen, and decarbonization technologies for aluminum
      and metals melting.
  - name: Edward Williams
    affiliation: Arconic
    background: Director of casting and metal management; aluminum casthouse technology, metal quality, and cast house R&D.
  - name: Alan Luo
    affiliation: Ohio State University
    background: Professor of materials science; lightweight aluminum/magnesium alloys, casting, and ICME for sustainable automotive
      manufacturing.
  scope: |-
    As the aluminum industry evolves, the importance of recycling has never been greater. Aluminum’s ability to be endlessly recycled without losing its properties makes it a vital material in the transition to more sustainable, low-carbon products. Recycling aluminum not only conserves resources but also significantly reduces energy consumption and greenhouse gas emissions compared to primary aluminum production. Innovations in recycling processes are essential to enhancing efficiency, lowering energy usage, and integrating higher levels of recycled material to meet the increasing demand for low-carbon aluminum in various industries. Melting and casting are key processes in producing efficient, cost- effective, high-quality, and sustainable aluminum products. However, challenges such as increasing production capacity, improving productivity, optimizing metal microstructure, controlling impurities, and incorporating more recycled content must be addressed to meet the growing demand for sustainable materials without compromising performance or quality.

    This symposium invites you to submit papers on both fundamental and applied research in the following areas:
    •    Inclusion Detection and Removal
    •    Dissolved Impurity Removal (e.g., Na)
    •    Filtration and Degassing
    •    Impact of Impurities on Cast Quality
    •    Grain Refinement Techniques
    •    Direct Chill Casting
    •    Open Mold Ingot Casting
    •    Strip Casting
    •    Melting and Casting of Highly Reactive Alloys (e.g., Al-Li)
    •    Cast Structures and Defects
    •    Automation, Process Modeling, and Control
    •    New Innovations in Process and Product Measurements and Control
    •    Industry 4.0 Applications in Aluminum Cast Shops
