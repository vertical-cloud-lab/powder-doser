  scope: |-
    The rapid transformation of materials production toward reduced environmental impact and lower CO2 emissions presents fundamental scientific challenges in metallurgy and materials science. Addressing these challenges requires a deeper understanding of the thermodynamic, kinetic, and microstructural principles that govern sustainable metal production, processing, and reuse. This symposium aims to provide a research-focused forum dedicated to the fundamental science underpinning sustainable metallurgy, bringing together materials scientists, metallurgical engineers, chemists, and physicists. The emphasis is on mechanistic understanding, theory development, and advanced characterization that enable the design of sustainable alloys and energy-efficient metallurgical processes. Contributions that combine experiments, modeling, and theory to reveal governing mechanisms in metallurgical processes are especially encouraged.

    We invite original research contributions related to, but not limited to, the following topics:
    •   Fundamental thermodynamics and kinetics of low-carbon metallurgical processes
    •   Mechanistic understanding of scrap metallurgy and secondary processing
    •   Alloy design for enhanced circularity and recyclability
    •   Metallurgical processes for industrial waste recycling and upcycling
    •   Energy-efficient processing and microstructure control
    •   Electrified, electrochemical, and plasma metallurgy
    •   Data-driven and multiscale modeling
    •   Advanced characterization of microstructure and properties of materials
    •   Metallurgy of critical metals and energy-related materials
