  scope: |-
    Composite materials are of growing interest for nuclear fusion and fission due to their combined excellent physical and mechanical properties that are compatible with extreme radiation and high temperature environments. With the development of next-generation fission reactors and fusion power, materials that can withstand higher neutron flux/thermal load/thermal mechanical stresses and more aggressive environments in terms of oxidation, corrosion/erosion, and tolerance to transmutation elements are required. This requirement makes it necessary to (i) understand the operational limits and degradation mechanisms of existing composite materials and (ii) develop and qualify new materials designs. There is a strong overlap in materials research between fission and fusion in terms materials design, processing, characterization, and modelling. This symposium aims to bring scientists and engineers together to share ideas and so join the effort in both fields at an international level for the development of these crucial composite materials and to enable collaborations across groups and countries.

    The design/processing/modelling/joining of the following materials, as well as their physical/mechanical characterization using ex situ and/or in situ techniques, are encouraged:
    •     Design, processing, and joining of composites for advanced fission and fusion reactors
    •     Modeling over multiple length scales
    •     Material physical and mechanical properties characterization using ex-situ and in-situ techniques
    •     Irradiation effects on materials properties and performance
    •     Chemical compatibility reactor relevant environments
    •     Hydrogen transport and trapping
    •     Composite materials systems can include (but are not limited to):
    •    Ceramic-based composites
    •    Metal-matrix composites

    Fuel-related composite systems are out of scope and should be submitted to ‘Advances in Understanding Nuclear Fuel and Cladding Behavior and Performance for Extreme Environments’. Carbon-carbon composites are covered under ‘Graphite and Carbon Materials for Extreme Environments’. This symposium focuses on ceramic- and metal-matrix composites for fission and fusion applications.
