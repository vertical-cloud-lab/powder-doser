    background: Associate professor of mechanical engineering; dynamic phase transformations in steels, thermomechanical processing,
      alloy design, and additive manufacturing.
  - name: Gaoyuan Ouyang
    affiliation: Ames Laboratory
    background: Staff scientist; high-silicon electrical steels, soft magnetic materials, and alloy structure-property relationships.
  - name: Leo Kestens
    affiliation: Ghent University
    background: Professor; crystallographic texture, recrystallization, and magnetic/mechanical anisotropy of electrical steels
      and sheet metals.
  scope: |-
    Electrical steels are essential energy conversion materials widely used in generators, transformers, electric motors, and other electromagnetic devices to confine the magnetic flux and amplify the conversions between electricity and other forms of energy. The efficiency of these devices is largely determined by the magnetic properties of the soft magnetic core manufactured from electrical steel sheets, which has an enormous impact on the generation, transmission, and the end use of electricity. With the wide adoption of renewable energies and electric vehicles as well as the emerging of Artificial General Intelligence, electrical steels are increasingly gaining momentum in the steel, automotive, clean energy and AI sectors, for the production of electric vehicles and wind turbines, building charging stations, and constructing AI data centers. Microstructure and texture control to optimize magnetic properties is still the focus of most electrical steel research. How to economically manufacture high-silicon electrical steel sheets using traditional technical routes is another area to be explored. There are also new theories, processing technologies and characterization methods proposed to advance electrical steel development and manufacturing. This symposium provides a venue for researchers, engineers, experts and enterprises from the world to share experiences, exchange ideas and establish collaborations in this field.

    The symposium includes but not limited to the following topics:
    1. Relationships among processing, microstructure/texture, and magnetic properties of electrical steels.
    2. Alloy development for high silicon electrical steels with improved formability.
    3. Casting and thermomechanical processing technologies to enable economical production of high silicon electrical steels.
    4. Theories regarding the evolution of texture and microstructure during all the electrical steel manufacturing stages.
    5. Novel characterization methods and tools to evaluate the microstructure, texture and magnetic properties of electrical steels.
    6. Alternative manufacturing methods to produce electrical steel sheets.
    7. Coating and bonding of electrical steel laminates.
    8. The manufacturing and assembling of electrical steel cores.
    9. Effect of manufacturing processes on the energy losses of electrical steel laminates.
    10. Other properties of electrical steels, e.g., chemical, physical, mechanical, electrical, etc.
