    This symposium celebrates the pioneering contributions of Professor John Ågren to materials science, particularly in diffusion, thermodynamics, and computational modeling of phase transformations. His groundbreaking work has shaped the theoretical and practical foundations of modern materials design, enabling advances across metallurgy, manufacturing, and engineering applications. The event will bring together colleagues, collaborators, and emerging scholars to highlight both the scientific legacy and the continuing impact of Ågren’s vision. Through invited talks, panel discussions, and technical sessions, the symposium will honor his achievements while exploring future directions inspired by his transformative influence on the field.

    Specific topics to be included, but not limited to, are:
    •   Phase transformations and microstructural evolution
    •   Multicomponent diffusion and its applications
    •   Extension of CALPHAD approaches to phase-based property data
    •   Applications to engineering alloys such as ferrous alloys, superalloys, and cemented carbides This symposium is invitation-only.
