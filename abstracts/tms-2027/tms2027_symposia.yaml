    This symposium explores the intersection of advanced materials science and circular economy principles to address the growing global demand for sustainable production and recycling of metals and ceramics. By bridging cutting-edge research in critical materials design, innovative processing technologies, experimental methodologies, and computational modeling with scalable industrial applications, the event will highlight strategies to minimize waste, reduce energy consumption, and extend material lifecycles. Discussions will span innovations at the atomic scale (e.g., recyclability-by-design alloys) to system-level solutions (e.g., AI-enhanced recovery networks), fostering collaboration among researchers, engineers, and policymakers to accelerate the transition toward closed-loop metallurgical systems.

    The symposium will be organized around the following key themes:
    1. Process-Scale Material Design and Process Innovation
    a.) Experimental methods for sustainable alloy and ceramic design and processing.
    b.) Computational techniques for recyclable alloy and ceramic design and development.
    c.) AI and machine learning approaches for sustainable materials discovery and process optimization.
    2. Next-Generation Circular Technologies
    a.) Reducing energy consumption and waste generation in critical material production, recovery, and recycling.
    b.) Cutting-edge innovations in materials circularity and advanced sorting technologies.
    c.) Novel recycling methods for critical materials.
    d.) Sustainable production of critical materials from critical mineral resources.
    3. Industrial Pathways to Circularity
    a.) Case studies in green steel, aluminum, battery materials, and related sectors.
    b.) Standardizing secondary materials for automotive/aerospace sectors.
    c.) Other structural and functional ceramics with supply chain challenges.
    d.) Scale-up circularity through lab automation, robotics, process optimization and AI/ML.
