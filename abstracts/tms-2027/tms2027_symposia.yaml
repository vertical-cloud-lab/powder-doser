      superhard, and energetic materials.
  - name: Atsutomo Nakamura
    affiliation: The University of Osaka
    background: Professor of mechanical science; dislocation engineering, photoplasticity, and mechanical behavior of ceramics
      and inorganic semiconductors.
  - name: Yu Zou
    affiliation: University of Toronto
    background: Associate professor and Canada Research Chair; cold spray and metal additive manufacturing, extreme mechanics,
      machine-learning alloy design.
  scope: |-
    Photomechanical and electromechanical phenomena provide powerful pathways to modify mechanical behavior through optical and electrical stimuli. These couplings link light, electric fields, or currents with elasticity, plastic deformation, fracture, and time-dependent mechanical response (e.g. creep) in ceramics, semiconductors, and metals. Understanding such effects is increasingly important for materials subjected to coupled mechanical, electrical, optical, and environmental conditions. Recent studies demonstrate that illumination and electric fields can significantly alter mechanical behavior by modifying bonding, charge distribution, and defect dynamics. In ceramics and semiconductors, photoexcitation changes carrier populations and defect charge states, leading to measurable variations in elastic stiffness, hardness, and dislocation mobility. In metals, applied electric fields or currents can reduce flow stress and enhance ductility through electroplastic effects. Environmental factors, including temperature, atmosphere, irradiation, and chemical exposure, further complicate these responses by involving defect chemistry and transport processes. This symposium will highlight experimental, theoretical, and computational advances that elucidate photomechanical and electromechanical behavior across relevant materials classes at various length scales. Emphasis will be placed on fundamental mechanisms linking coupled stimuli, microstructure, defects, and environment to mechanical performance, as well as emerging characterization and modeling approaches. Contributions addressing deformation, damage, reliability, and multifunctional performance under combined stimuli are encouraged.

    Topics of Interest
    •   Photomechanical effects: photoelasticity, photoplasticity, and light-induced mechanical changes
    •   Electroplasticity and electric-field or current-driven deformation in metals
    •   Charge-mediated dislocation dynamics and defect interactions
    •   Coupled mechanical behavior under optical, electrical, and thermal stimuli
    •   In situ mechanical testing under illumination or electrical bias
    •   Environmental effects on photo- and electro-mechanical responses
    •   Time-resolved and operando characterization of coupled behavior
    •   Modeling of opto-electro-mechanical coupling from atomic to continuum scales
    •   Deformation, damage, and reliability under combined stimuli
    •   Multifunctional materials and devices exploiting coupled fields
