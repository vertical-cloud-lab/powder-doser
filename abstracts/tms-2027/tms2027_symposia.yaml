  scope: |-
    The Alumina and Bauxite Symposium has long been a cornerstone of the Light Metals program. Over the years, groundbreaking studies that have helped shape the industry have been presented at this symposium. As the global landscape for Alumina and Bauxite evolves, new topics such as bauxite residue utilization, decarbonization, digitalization, artificial intelligence, and high-purity alumina are emerging. At the same time, traditional areas like process control and development, analytical methods, sustainability and environmental issues, cost reduction strategies, and alumina properties and quality remain central.

    In 2027, the symposium will not only feature technical papers but will also host meet-up sessions with startups, universities, and suppliers. These sessions will showcase the latest developments, bridging the gap between established industry leaders and cutting-edge innovations. This is an exceptional opportunity to engage with global experts in the Light Metals industry and gain the latest insights on the most pressing issues. Join the Alumina and Bauxite Symposium in 2027 to take part in this exciting event. We encourage you to submit papers and actively participate in this unique opportunity.

    We are combining the Supplier Forum as a session within the Alumina and Bauxite Symposium. This option is available for industry participants to present their latest technologies and innovations. We cannot offer the supplier forum option to all participants. A limited number of speaking slots are available in the supplier forum session. Manuscript submission is required for all participants in the symposium with the exception of those participating in the Supplier Forum. In July, subject chairs will notify presenters to participate in the supplier forum. If you do not receive a message in July to speak in the Supplier Forum, then manuscript submission will be required to participate in the symposium.

    Note regarding publication: Authors wishing to present an oral paper in the symposium sessions must submit a manuscript for the Light Metals proceedings or have their work accepted for publication in a TMS journal. Presentations in the supplier forum will not need a manuscript in the Light Metals proceedings.
