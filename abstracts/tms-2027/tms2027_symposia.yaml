  scope: |-
    The Advanced Real Time Imaging for Materials Science and Processing symposium marks the 10th year anniversary at TMS2027. In this regard, the symposium intends to publish a standalone book (TMS, Springer Nature) for all the papers submitted to the symposium. Presenters are strongly encouraged to submit papers to be included in this 10th anniversary special edition. (Each paper will be treated as a book chapter.) Real time, in-situ and in operando observations of the dynamic behaviors of materials across different spatiotemporal scale can provide important and critical information for understanding the materials behavior in different conditions. Many innovative and emerging advanced imaging techniques can provide the temporal and spatial insights that other indirect conventional experimental techniques cannot access to. These may include optical, laser, electron, X-ray, neutron imaging techniques, and other emerging methods. Integrating those imaging techniques in heating, isothermal holding, and cooling under controlled atmospheres, and/or stress/strain conditions, valuable real time thermodynamic and kinetic data can be generated for a variety of materials and processes. This symposium may encompass a broad range of materials science topics enabling cross-cutting opportunities for multiple disciplines (structural materials, manufacturing processes, energy materials, functional materials, biomaterials, etc.) but it focuses primarily on real time imaging techniques, which are enhanced with advanced approaches. Presentations are solicited on the conceptual introduction or the application of these methods to materials science and industrial processes, as well as on development of such techniques.

    Topics include, but not limited to:
    •   Real time optical (e.g., visible light, white light, laser, IR, UV, high/low speed) and non-optical (e.g., scanning probe, electron, ultrasound, X-ray, neutron) imaging techniques
    •   In-situ, in-operando, in-vitro, and in-vivo imaging techniques, such as thermal imaging furnace and other real time imaging methods
    •   Confocal techniques, including fluorescence and reflection types, which may be equipped with capabilities such as heating/cooling chambers, gas chambers, mechanical testing, Raman spectroscope, mass spectrometry, and FTIR
    •   Microscopic and/or telescopic imaging methods include hot thermocouple, resistance heating, and sessile drop techniques used for high temperature phenomena
    •   Techniques to generate thermodynamic and kinetic data, useful for phase diagram constructions, oxidation/corrosion modeling, phase formation kinetics studies, etc.
    •   Materials used in the manufacturing of real time imaging devices
    •   Novel technologies and methodologies for emerging imaging devices

    Joint sessions with other symposia may take place if mutual benefits are found.
- id: 008
  title: Characterization of Materials Through High Resolution Coherent Imaging VIII
  track: Advanced Characterization Methods
  flyer_url: https://www.tms.org/tms2027/downloads/flyers/TMS2027-CFA-Flyer-008.pdf
  division_sponsors:
  - TMS Structural Materials Division
  - TMS Extraction and Processing Division
  committee_sponsors:
  - 'TMS: Advanced Characterization, Testing, and Simulation Committee'
  - 'TMS: Materials Characterization Committee'
  organizers:
  - name: Wonsuk Cha
    affiliation: Argonne National Laboratory
    background: Physicist at the Advanced Photon Source; Bragg coherent X-ray diffraction imaging of nanoscale structure and
      defect dynamics.
  - name: Xianghui Xiao
    affiliation: Brookhaven National Laboratory
    background: Beamline scientist at NSLS-II; synchrotron X-ray imaging and tomography for in situ materials characterization.
  - name: Richard Sandberg
    affiliation: Brigham Young University
    background: Physics professor; coherent X-ray diffractive imaging of materials dynamics under extreme conditions.
  - name: Ross Harder
    affiliation: Argonne National Laboratory
    background: Physicist at the Advanced Photon Source; Bragg coherent X-ray diffraction imaging of nanoscale strain in materials.
  - name: Brian Abbey
    affiliation: La Trobe University
    background: Professor of physics; coherent X-ray diffraction imaging and X-ray free-electron laser materials characterization.
  - name: Saryu Fensin
    affiliation: Los Alamos National Laboratory
    background: Scientist; dynamic behavior of metals, spall and damage nucleation, grain boundary effects under shock loading.
  - name: Ana Diaz
    affiliation: Paul Scherrer Institute
    background: Senior beamline scientist; hard X-ray ptychography and coherent diffractive imaging at the Swiss Light Source.
  - name: Mathew Cherukara
    affiliation: Argonne National Laboratory
    background: Computational scientist and group leader; AI-driven coherent X-ray diffraction imaging and real-time image
      reconstruction.
  scope: |-
    A high degree of spatial coherence is an attractive property in X-ray and electron beams. In some cases, these imaging methods provide resolution beyond that achieved with optics and can also provide remarkable sensitivity to a variety of contrast mechanisms. Various novel X-ray and electron coherent imaging methods have been developed and optimized, leading to rapid growth in applications over the past decades. It is expected that this progress will get a further boost as new sources which deliver highly coherent beams would allow experiments at better precision and sensitivity in shorter time. This symposium will highlight cutting-edge research in coherent and phase contrast imaging techniques, including X-ray and electron-based approaches like coherent diffraction imaging (CDI), ptychography, holography, and advanced phase contrast imaging (PCI) methods. We will explore their applications across diverse materials classes and delve into the integration of modeling, simulation, and artificial intelligence (AI) for enhanced characterization and analysis. We hope this symposium will help to foster collaboration and advance the field of coherent and phase contrast imaging.

    Areas of interest include, but are not limited to:
    •   All coherent and phase contrast X-ray-based techniques including Bragg CDI, Fresnel CDI, ptychographic CDI, propagation phase contrast imaging, interferometry imaging, and analyzer-based phase-contrast imaging.
    •   All electron-based techniques including ptychography and electron CDI.
    •   High performance computing (HPC) and AI to accelerate data analysis, improve image quality, imaging speed/efficiency, and autonomously steer experiments.
    •   Digital twins to inform high-resolution imaging experiments.
    •   AI/ML techniques for high resolution x-ray/electron image analysis.
    •   All structural and functional materials systems needing high resolution imaging.
    •   Developments of new CDI/PCI experimental methods.
    •   New sample preparation and in-situ/operando measurement protocols.
