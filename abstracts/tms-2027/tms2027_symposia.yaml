    Powder materials synthesis, processing, characterization, and fundamental understanding form the scientific foundation underlying a wide range of structural and functional technologies. With recent advances in experimental techniques, computational methods, and data science, new opportunities have emerged to uncover the fundamental mechanisms governing powder behavior across metallic, ceramic, and hybrid material systems. This symposium focuses on the fundamental science of powder materials, emphasizing processing–structure–property relationships and mechanistic understanding across diverse material classes. Contributions addressing both metallic and ceramic powders are strongly encouraged. The symposium is not intended to focus on specific material classes or application-driven development, but rather on advancing the scientific foundations of powder materials processing.

    Topics of interest include, but are not limited to:
    •   Fundamental mechanisms in powder synthesis and processing
    •   Thermodynamics and kinetics of sintering and densification
    •   Powder forming and shaping science (including additive manufacturing from a mechanistic perspective)
    •   Processing–microstructure–property relationships in powder-derived materials
    •   Powder behavior under extreme or harsh environments
    •   Advanced experimental techniques for powder characterization In situ and operando studies of powder processing phenomena
    •   Microstructural evolution and fundamental property evaluation
    •   Computational modeling and simulation of powder systems
    •   Machine learning and data-driven discovery in powder materials science
    •   Energy-efficient densification strategies and sustainability science in powder processing
