  scope: |-
    This symposium focuses on the critical role of tramp elements in recycled and scrap-based metallic systems and their implications for sustainable manufacturing. As global demand for circular materials usage intensifies, increased reliance on scrap feedstocks introduces challenges associated with residual elements such as Cu, Sn, Ni, Pb, and others that are difficult to remove during conventional processing. These elements can significantly influence phase stability, microstructural evolution, defect formation, and ultimately mechanical and functional performance.

    The symposium aims to bring together researchers and industry practitioners to address fundamental and applied aspects of tramp element behavior across a range of alloy systems, including ferrous, non-ferrous, and high-performance alloys.

    Topics of interest include:
    •   Advanced characterization of trace elements
    •   Thermodynamic and kinetic modeling of impurity effects
    •   Impacts on casting, forming, and additive manufacturing
    •   Impurity mitigation, tolerance design, and alloy innovation
    •   Industrial challenges and impacts on processing, microstructure, and performance

    By integrating insights from characterization, processing, and modeling, this symposium will provide a platform to advance the scientific understanding and practical solutions needed to enable robust, high-quality manufacturing from recycled materials, supporting the transition toward a more sustainable and resource-efficient materials economy.
- id: '010'
  title: Four-Dimensional Scanning Transmission Electron Microscopy (4D STEM) for Quantitative Materials Characterization
  track: Advanced Characterization Methods
  flyer_url: https://www.tms.org/tms2027/downloads/flyers/TMS2027-CFA-Flyer-010.pdf
  division_sponsors:
  - TMS Extraction and Processing Division
  - TMS Structural Materials Division
  committee_sponsors:
  - 'TMS: Advanced Characterization, Testing, and Simulation Committee'
  - 'TMS: Materials Characterization Committee'
  organizers:
  - name: Yang Yang
    affiliation: Pennsylvania State University
    background: Assistant professor; in situ and 4D-STEM electron microscopy of materials degradation under irradiation, corrosion,
      and deformation.
  - name: Benjamin Savitzky
    affiliation: Brown University
    background: Electron microscopist; lead developer of py4DSTEM open-source software for quantitative 4D-STEM data analysis.
  - name: Meng Li
    affiliation: Brookhaven National Laboratory
    background: Staff scientist, Center for Functional Nanomaterials; in situ transmission electron microscopy of corrosion
      and catalysis, microscopy instrumentation development.
  - name: Christoph Gammer
    affiliation: Austrian Academy Of Sciences
    background: Group leader, Erich Schmid Institute; in situ TEM and 4D-STEM nanoscale strain mapping of complex materials.
  - name: Paul Voyles
    affiliation: University of Wisconsin
    background: Professor of materials science; quantitative STEM, fluctuation and 4D electron microscopy of glassy and functional
      materials.
  scope: |-
    Four-dimensional scanning transmission electron microscopy (4D STEM) has rapidly emerged as a transformative platform for quantitative materials characterization. By recording a full diffraction pattern at each probe position, 4D STEM enables spatially resolved mapping of crystal orientation and phase, elastic strain and rotation, local symmetry breaking and ordering, and mesoscale heterogeneity over large fields of view. When paired with reconstruction methods such as ptychography, 4D STEM can surpass conventional resolution limits and deliver high- fidelity phase imaging. Modern workflows also support quantitative mapping of electric and magnetic fields and statistically robust detection of point and planar defects. These strengths make 4D STEM attractive for complex materials where traditional atomic-resolution approaches struggle, and for integration with in situ and operando experiments. This symposium is timely because 4D STEM is increasingly accessible in commercial instruments while advances in detectors, acquisition strategies, analysis software, and artificial intelligence continue at a rapid pace. The symposium will bring together experts from microscopy and materials communities to share new 4D STEM methodologies and highlight impactful applications across structural and functional materials, including metals, ceramics, semiconductors, energy materials, soft and hybrid materials, and minerals.

    We welcome contributions that present:
    1. New techniques or analysis pipelines, including tutorial-style “how-to” talks;
    2. Validation and metrology studies addressing accuracy, precision, uncertainty quantification, and standards;
    3. Applications that reveal structure–property relationships or access previously hidden materials information.

    Topics of interest include acquisition and detector innovations; orientation, phase, strain, electric and magnetic field mapping; local ordering and symmetry analysis; ptychography and phase reconstruction; defect and interface characterization; in situ and operando 4D STEM (heating, biasing, mechanical testing, electrochemistry, environmental cells, radiation, time-resolved studies); and data analytics, automation, and best practices for sharing and reproducibility.
