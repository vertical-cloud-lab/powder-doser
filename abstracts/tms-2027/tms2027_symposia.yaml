  scope: |-
    Functional nanomaterials are a broad class of materials with emergent properties originating from their reduced physical dimensions, unique morphologies, and tunable structures. They offer exciting new opportunities for innovations across a host of applications including quantum computing, electronics, energy generation and storage, advanced sensors, high performance materials, and healthcare technologies. The 2027 Symposium on Functional Nanomaterials will focus on the use of nanomaterial design to achieve scalable architectures and application-scale functionality, advanced by the use of AI and autonomy. Of specific interest are topics such as multiscale architectures, manufacturability- informed design, and emerging fabrication strategies where data driven approaches can accelerate the discovery of material design, functionality, processibility, and manufacturing scalability. Along with sessions for conventional nanomaterials, focused sessions will be dedicated to unique design/manufacturing/characterization strategies of nanomaterials aided by AI and autonomous experiments.

    Examples of session topics include but are not limited to:
    •   Data-Driven and Autonomous Discovery in Nanomaterials
    •   Atomically Precise Nanostructures: From Defect Engineering to Quantum Materials
    •   Hierarchical and Multiscale Architectures Bridging Nano-to-macroscale Functionality
    •   Manufacturing-aware Design and Translation of Nanomaterials to Robust Applications

    The focus of this symposium is on methods of fabrication, simulation/computation studies, and device performance. Please consider the “2D Materials – Preparation, Properties, Modeling & Applications” Symposium for other submissions.
