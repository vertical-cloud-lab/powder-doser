  scope: |-
    Recent developments in the field of compositionally complex and structurally heterogeneous materials have sparked thought-provoking discussions regarding the role of local ordering (LO), including chemical and structural order, in governing mechanical behavior, irradiation response, and corrosion resistance across a wide range of material systems. The scientific and practical motivation is that “local ordering” could present a new dimension for tuning fundamental mechanisms and hence designing the desired behaviors in demanding environments. Meanwhile, from a fundamental perspective, understanding the state of LO and its ubiquity and tunability is essential for developing predictive models and establishing microstructure-property relationships. Despite this growing recognition, a validated thermodynamic and kinetic framework of LO and its connections to defect kinetics, microstructural evolution and phase stability is still lacking. This absence reflects the intrinsic complexity of LO and the challenges associated with characterizing its dynamic evolution across multiple time scales using current experimental and computational methods. This symposium focuses on exploring emerging techniques in computational, experimental and theoretical efforts to understand LO and its impact on material properties. The goal is to facilitate fundamental understanding of novel concepts within the community and to discuss methodological challenges hindering the quantitative characterization and predictive modeling of LO.

    Specific topics include:
    •   LO impact on defects and microstructural evolution, from the atomistic to the mesoscale.
    •   Non-equilibrium dynamics and kinetics under extreme driving conditions, including high/cryogenic temperature, radiation, and corrosion.
    •   Experimental characterizations and in-situ techniques, including S/TEM, 4D STEM, SEM, in situ TEM, and X-Ray methods.
    •   Multiscale simulation and modeling approaches, including first-principles methods, atomistic simulations, thermodynamic modeling, machine learning, and kinetic Monte Carlo approaches.
