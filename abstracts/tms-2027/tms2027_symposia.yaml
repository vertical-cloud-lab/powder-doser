    This long-established symposium will provide an excellent platform to exchange the latest knowledge in additive manufacturing (AM) modeling, simulation, and artificial intelligence/machine learning (AI/ML). Despite extensive progress in the AM field, many challenges in predictive, theoretical, and computational approaches still hinder the advancement of AM technologies.

    The symposium is interested in receiving contributions in the following non-exclusive areas:
    1. Modeling of microstructure evolution, phase transformation, and defect formation in AM parts
    2. Modeling of residual stress, distortion, plasticity/damage, creep, and fatigue in AM parts
    3. Machine learning (ML), artificial intelligence (AI), data science (DS), and uncertainty quantification (UQ) applications to AM
    4. AM process monitoring and defect quantification for model verification and validation
