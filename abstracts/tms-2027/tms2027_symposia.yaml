      ultrahard ceramics, and high-throughput characterization.
  scope: |-
    This symposium will honor the outstanding contributions of Professor John H. Perepezko to the field of materials science, specifically the subject area of phase transformations, in the last 50+ years. Professor Perepezko has made seminal scientific contributions to the mechanisms, thermodynamics and kinetics of phase transformations, nucleation during solidification, metastable phases and oxidation. He has developed a variety of materials including intermetallic alloys, high temperature alloys, amorphous metals, metal powders and composite materials. This symposium will discuss the present status and recent advances in the fundamental aspects of phase transformations, including thermodynamic driving force for phase transformations, the kinetics of nucleation and growth, interfacial structure and interfacial energies, transformation crystallography, and the atomic mechanisms of phase transformations. Sessions will cover a breadth of materials and processes that are investigated experimentally and/or computationally.
