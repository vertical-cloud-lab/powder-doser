  scope: |-
    To meet the growing global energy demands, next-generation power plants, such as Gen-IV fission reactors, fusion reactors, and advanced gas turbine power plants will require significant advancement in the refractory alloys space. Refractory multi-principal element alloys (R-MPEAs) can offer synergistic advantages, such as ultra-high operating temperatures (> 1200 °C), hierarchical deformation mechanisms, and high specific strength at elevated temperatures. However, several challenges exist that hinder the implementation of these alloys. For example, R-MPEAs exhibit poor processability with advanced processing routes, such as additive manufacturing (AM), as well as poor tensile ductility and fracture toughness, particularly at ambient to intermediate temperatures. This symposium welcomes research works advancing (i) processability and processing, particularly with AM and powder metallurgy processes (ii) understanding of the microstructure evolution, deformation behavior, and properties, and (iii) novel alloy design of refractory alloys, including but not limited to R-MPEAs.

    Topics of interest include:
    1. Studies leveraging computational tools, such as density functional theory, molecular dynamics, phase-field models, CALPHAD, and artificial intelligence/machine learning for designing novel refractory alloys, including R-MPEAs.
    2. Modeling approaches, such as discrete dislocation dynamics and crystal plasticity aimed at understanding multiscale phenomena, such as grain boundary cohesion, and dislocation dynamics in refractory alloys are particularly encouraged.
    3. Works addressing challenges in processability with advanced manufacturing processing routes, such as fusion-based AM. Solidification and solid-state defects in the processed alloys and strategies for mitigating AM processability related challenges.
    4. Solidification behavior, microstructure evolution, mechanical and functional properties of novel refractory alloys, including novel refractory MPEAs.
    5. Room and elevated temperature deformation and damage mechanisms in refractory MPEAs, including those fabricated by AM and powder metallurgy processes.
