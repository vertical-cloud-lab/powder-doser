  scope: |-
    This symposium highlights advances in applying Artificial Intelligence (AI) across the full spectrum of Integrated Computational Materials Engineering (ICME), with emphasis on methods that strengthen and accelerate process-structure-property-performance linkages. Contributions are welcome on data-driven, physics-informed, and hybrid approaches spanning multiscale modeling, microstructure characterization, materials and process design, and manufacturing decision support. Relevant themes include machine learning and deep learning surrogates for computationally intensive simulations; generative and optimization methods (including active learning and Bayesian optimization) for accelerated discovery and processing-parameter selection; and uncertainty quantification and design under uncertainty, interpretability, and verification/validation needed for trustworthy deployment. We also encourage emerging foundation-model capabilities, such as multimodal models, large language models (LLMs), and agentic AI, when they enable practical ICME outcomes (e.g., literature-to-data extraction, natural-language interfaces to modeling workflows, knowledge integration with curated databases, or to accelerate materials development). Submissions should address data quality, reproducibility, and pathways to adoption in industrial and certification contexts.

    Typical topics include but are not limited to:
    •    AI/ML methods to strengthen process-structure-property-performance linkages across ICME
    •    Physics-informed, hybrid, and multi-fidelity models for multiscale ICME integration
    •    Surrogate modeling and reduced-order models to accelerate FE/CPFEM/phase-field/MD and related simulations
    •    AI-enabled microstructure characterization and structure-property inference from multimodal data (images, spectra, processing history)
    •    Generative models for alloy/composition design, microstructure synthesis, and inverse design under constraints
    •    Active learning, Bayesian optimization, and autonomous/closed-loop experimentation for accelerated discovery and processing optimization
    •    Uncertainty quantification, calibration, interpretability, and verification/validation of AI models for ICME decision-making
    •    Data curation, standards, provenance/traceability, and reproducible machine learning operations (MLOps) pipelines for ICME deployment
    •    Integration of AI with materials databases, ICME toolchains, and digital manufacturing/digital twin frameworks
    •    Practical applications of foundation models including LLMs for knowledge extraction, workflow assistance, and decision support in ICME
- id: '025'
  title: 'Avoiding Plot Holes: Telling Compelling Stories (with Data)'
  track: Data-Driven and Computational Materials Design
  flyer_url: https://www.tms.org/tms2027/downloads/flyers/TMS2027-CFA-Flyer-025.pdf
  division_sponsors:
  - TMS Structural Materials Division
  - TMS Materials Processing and Manufacturing Division
  committee_sponsors:
  - 'TMS: Advanced Characterization, Testing, and Simulation Committee'
  - 'TMS: Education Committee'
  - 'TMS: Integrated Computational Materials Engineering Committee'
  organizers:
  - name: Benjamin Begley
    affiliation: ATI
    background: Metallurgist; integrated computational materials engineering, crystal plasticity, and texture evolution in
      thermomechanically processed titanium alloys.
  - name: Eric Payton
    affiliation: University of Cincinnati
    background: Associate professor, former AFRL metals research leader; alloy design, physical metallurgy, and critical-materials
      sustainability.
  - name: Suveen Mathaudhu
    affiliation: Colorado School of Mines
    background: Professor of metallurgical engineering; powder and deformation processing of nanocrystalline, lightweight,
      and refractory alloys; science communication.
  - name: Victoria Miller
    affiliation: University of Florida
    background: Associate professor of materials science; recrystallization, texture evolution, and thermomechanical processing
      of magnesium and structural alloys.
  scope: |-
    Every materials research project contains the raw components of a compelling narrative: our projects have protagonists (a revolutionary new alloy; a hard to interpret diffraction pattern), motivation (the program manager liked it; we’re about to run out of neodymium), dramatic tension (the EBSD detector was down for the 6th time this month!), and climactic resolution (the last result makes sense, I can schedule my defense now!). And yet, we rarely leverage these narrative elements when communicating our work—especially not to other materials scientists. This symposium explores the dual meaning of “plot” in materials science: both the research stories and the data visualizations we need to tell them. Whether you’re wrestling with matplotlib formatting at 2 AM or trying to explain why your research pivot actually made the project better, we’re here to help. We examine communication as a craft and explore how storytelling techniques from literature and film can enhance scientific communication without sacrificing rigor (or your credibility at group meeting). This symposium welcomes contributions spanning the full spectrum of scientific communication in materials science & engineering. Share your hard-won wisdom on making figures that actually clarify instead of confuse, structuring presentations that keep your audience awake, or navigating the brave new world of AI writing assistants. We particularly encourage talks that embrace the complete arc of research—the unexpected detours, the “wait, what?” moments, and the fortuitous accidents that led somewhere interesting but rarely make it into the polished conference presentation.

    Suggested topics include (but are not limited to):
    •   Creating data visualizations that advance the plot (not obscure it)
    •   Narrative writing strategies for manuscripts, proposals, and that email to your collaborator explaining what actually happened
    •   Presentation design and delivery that engages scientific audiences (yes, even at 4:30 PM on the last day)
    •   Responsible uses of large language models: When to let ChatGPT write a draft and when to keep your human hands on the keyboard
    •   Science story time: Full-narrative talks from experts who’ll share how their research really unfolded
- id: '026'
  title: Bridging Scale Gaps in Multiscale Materials Modeling in the Age of Artificial Intelligence
  track: Data-Driven and Computational Materials Design
  flyer_url: https://www.tms.org/tms2027/downloads/flyers/TMS2027-CFA-Flyer-026.pdf
  division_sponsors:
  - TMS Materials Processing and Manufacturing Division
  committee_sponsors:
  - 'TMS: Computational Materials Science and Engineering Committee'
  - 'TMS: Integrated Computational Materials Engineering Committee'
  organizers:
  - name: Liang Qi
    affiliation: University of Michigan
    background: Associate professor; first-principles and multiscale modeling of deformation, phase transformation, and degradation
      in structural alloys.
  - name: Yue Fan
    affiliation: University of Michigan
    background: Associate professor of mechanical engineering; atomistic modeling of metallic glasses, defects, and materials
      in extreme environments.
  - name: Javier Segurado
    affiliation: E.T.S.I. Caminos, Canales y Puertos. Universidad Politécnica de Madrid
    background: Professor; computational micromechanics, crystal plasticity, and multiscale modeling of metal deformation.
  - name: Katsuyo Thornton
    affiliation: University of Michigan
    background: Professor of materials science; phase-field modeling of microstructure evolution and computational studies
      of electrochemical systems.
  scope: |-
    The connections between computational materials tools across different length and time scales remain long-standing challenges. Many physics-based methods still struggle to construct quantitative governing equations from lower-scale simulation data with sufficient accuracy, robustness, and transferability for higher-scale models. These challenges have become increasingly urgent with the rapid expansion of research on chemically complex materials (including high-entropy materials), materials under extreme conditions, and advanced manufacturing and processing. Meanwhile, advances in high-performance computing, automated simulation workflows, and open materials data infrastructures have greatly expanded the availability of high-quality training datasets. In parallel, recent developments in artificial intelligence (AI), including foundation models, equivariant neural networks, active learning, uncertainty-aware learning frameworks, and symbolic regression for equation discovery, are enabling new approaches for integrating physics, data, and computation. These methods create new opportunities to identify governing equations and reduced-order physical models directly from high-fidelity simulation and experimental data. To reflect these trends, this symposium focuses on AI-enabled strategies for building quantitative, physically consistent, and robust multiscale connections to accurately explain and predict complex material behaviors.

    Topics include, but are not limited to:
    •   Physics-informed, hybrid, and data-driven prediction of material properties using first-principles, atomistic, and experimental datasets.
    •   Next-generation machine learning interatomic potentials, including equivariant and foundation-model-based approaches.
    •   AI-informed mesoscale modeling (phase field, Monte Carlo, kinetic Monte Carlo, dislocation dynamics, crystal plasticity, etc.) based on data- driven or physics-guided governing equations.
    •   Data-driven discovery of governing equations and constitutive relations using symbolic regression and equation-learning methods.
    •   AI-assisted calibration and reduction of phenomenological models using large-scale simulation and multimodal experimental data.
    •   Data-driven uncertainty quantification and tuning of governing equations for mesoscale and continuum simulations.
    •   Closed-loop and autonomous multiscale workflows integrating simulation, machine learning, symbolic regression, and experiments.
