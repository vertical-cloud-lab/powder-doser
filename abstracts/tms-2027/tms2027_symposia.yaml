    Key Topic(s) to be covered include, but are not limited to:
    •    Coatings: Advances in metallic, ceramic, organic, and composite coatings, focusing on their development, properties, and performance.
    •    Surface Protection: Innovations in protecting surfaces from wear and corrosion to enhance durability and functionality.
    •    2D Materials and Thin Films: Progress in the synthesis, characterization, and application of two-dimensional materials and thin films.
    •    Surface Characterization Techniques: Exploration of advanced methods to analyze and understand surface properties and behaviors.
    •    Surface Alloying and Microstructural Modifications: Techniques to alter and optimize surface compositions and structures for improved performance.
    •    Functionally Graded and Nanostructured Coatings: Development of coatings with tailored properties to meet specific application requirements.
    •    Coatings for Extreme Environments: Innovations in coatings designed to withstand extreme thermal, radiation and other environmental conditions.
    •    Additive Manufacturing and Solid-State Processing of Coatings: Emerging techniques for producing advanced coatings using additive manufacturing and solid-state processes.

    By exploring these critical areas, this symposium will serve as a platform for presenting pioneering research, discussing practical challenges, and envisioning future trends in surface engineering.
