  - name: Antoine Claisse
    affiliation: Westinghouse Electric Sweden
    background: Nuclear fuel engineer; multiscale modeling of nuclear fuel performance and advanced fuel/cladding development
      and qualification.
  scope: |-
    Extreme environments of energetic particle irradiation and high temperatures push materials outside of their equilibrium states by producing a high density of defects and causing complex transitions, ultimately changing the microstructure and properties of materials. Significant progress has been made over the past decades in both computational and experimental approaches to elucidate the complex processes underlying radiation damage. Advances in computational modeling and artificial intelligence (AI) have revolutionized the scientific understanding and engineering of nuclear materials, enhancing predictions for material behavior under extreme conditions, optimizing experimental design, and accelerating materials discovery. However, ensuring the reliability and applicability of these tools requires rigorous experimental validation and collaborative data sharing. This symposium seeks to bring together experts from modeling, AI, and experimental materials science to foster cross-disciplinary interactions, present recent advances, and chart future directions.

    Topics of interest include, but are not limited to:
    •   Atomistic and Mesoscale Modeling: State-of-the-art modeling and simulation approaches, including (but not limited to) atomic level simulations, mesoscale methods for nuclear materials, and extended time-scale techniques to bridge experiments and modeling.
    •   Al and Machine Learning in Nuclear Materials: Interatomic potential development and surrogate modeling.
    •   Data Analytics and Model Validation: Techniques for data analytics and model validation, e.g., through coupled computational- experimental workflows or high-throughput approaches.
    •   Multi-scale and Multi-physics Approaches: Linking models from atomistic to engineering scales, uncertainty quantification and validation as related to model development.
    •   Open Science, Fair Data and Reproducibility: Best practices for data sharing and model benchmarking. This symposium focuses on method and framework development; studies emphasizing material-specific behavior should be submitted to other appropriate symposia.
- id: '101'
  title: 'Radiation Effects in Solid-State Materials: An SMD Symposium Honoring William J Weber'
  track: Nuclear Materials
  flyer_url: https://www.tms.org/tms2027/downloads/flyers/TMS2027-CFA-Flyer-101.pdf
  division_sponsors:
  - TMS Structural Materials Division
  - TMS Functional Materials Division
  committee_sponsors:
  - 'TMS: Nuclear Materials Committee'
  - 'TMS: Thin Films and Interfaces Committee'
  - 'TMS: Alloy Phases Committee'
  organizers:
  - name: Dilpuneet Aidhy
    affiliation: Clemson University
    background: Associate professor; computational materials science (DFT, molecular dynamics, machine learning) of defects,
      high-entropy alloys, and oxides.
  - name: Eva Zarkadoula
    affiliation: Oak Ridge National Laboratory
    background: Staff scientist; molecular dynamics simulations of radiation effects, ion irradiation damage, and electronic
      excitations in materials.
  - name: Ritesh Sachan
    affiliation: Oklahoma State University
    background: Associate professor of mechanical and aerospace engineering; radiation effects, laser and ion irradiation
      of nanomaterials, electron microscopy.
  - name: Ram Devanathan
    affiliation: Pacific Northwest National Laboratory
    background: Division director and computational materials scientist; multiscale simulation of nuclear and energy materials,
      including radiation effects.
  - name: Fei Gao
    affiliation: University of Michigan
    background: Professor of nuclear engineering; multiscale simulation of radiation effects in ceramics, nuclear fuels, and
      reactor materials.
  - name: Gihan Velisa
    affiliation: Horia Hulubei National Institute for Phys. & Nucl. Eng.
    background: Senior researcher; ion irradiation and radiation effects in ceramics, perovskites, and concentrated solid-solution
      alloys.
  scope: |-
    Dr. William J. Weber has made seminal contributions to the field of radiation effects in solid-state materials, significantly advancing the fundamental understanding of defect formation, accumulation, and recovery in ceramics and complex oxides under irradiation. His pioneering research has advanced understanding of mechanisms of radiation-induced amorphization, defect kinetics, and the influence of material structure on radiation tolerance, particularly in materials relevant to nuclear waste immobilization, nuclear fuels, and electronic devices. Radiation effects in solid-state materials encompass the diverse physical and chemical changes induced when energetic particles—such as ions, neutrons and electrons—interact with the atomic lattice and electrons. These interactions can displace atoms, generate point and electronic defects, create extended defect structures, induce phase transformations, drive ionization-induced annealing, and influence electron-phonon coupling, fundamentally altering materials microstructure and properties. The proposed symposium aims to bring together researchers from diverse disciplines to discuss the latest advances, challenges, and future directions in understanding and mitigating radiation effects in solid-state materials. Topics will span fundamental mechanisms, novel experimental techniques, advanced simulations, and materials design strategies for applications in nuclear energy, space exploration, microelectronics, and quantum technologies. By fostering interdisciplinary dialogue, this symposium will identify knowledge gaps, stimulate innovative solutions, and chart a path forward for research that bridges basic science and engineering applications.

    The symposium invites presentations and abstracts on, but not limited to, the following topics:
    •    Fundamental mechanisms of radiation damage in nuclear materials, semiconductors, and materials designed for space.
    •    Neutron and ion irradiation experiments, including swift heavy ion irradiation and electronic energy loss effects
    •    Advanced characterization techniques for analyzing radiation-induced defects
    •    Electron-phonon coupling phenomena under irradiation conditions
    •    Computational modeling, multiscale simulations, and machine learning approaches to study radiation effects across spatial and temporal scales
    •    Materials design and development for nuclear reactors, fusion energy systems, and radiation-tolerant applications
    •    Microstructure evolution and defect dynamics under irradiation
    •    In-situ experimental techniques for studying ion-solid interactions and radiation damage in real-time
    •    Synergistic effects of radiation and other extreme environments, including high temperatures, mechanical stress, and corrosion
