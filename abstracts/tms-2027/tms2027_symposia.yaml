    affiliation: Oak Ridge National Laboratory
    background: Senior researcher; inelastic neutron and X-ray scattering studies of phonons, heat transport, and lattice
      dynamics.
  - name: Chen Li
    affiliation: University of California-Riverside
    background: Professor of mechanical engineering; phonon transport and lattice dynamics in thermal and energy materials
      via neutron and X-ray scattering.
  - name: Hillary Smith
    affiliation: Swarthmore College
    background: Physics professor; neutron and X-ray scattering of phonon dynamics, thermodynamics, and glass-forming materials.
  - name: Matthew Steiner
    affiliation: University of Cincinnati
    background: Associate professor; neutron and X-ray diffraction, texture, phase transformations, nuclear materials, and
      tetrataenite magnets.
  - name: Jennifer Niedziela
    affiliation: Oak Ridge National Laboratory
    background: Condensed matter physicist and group lead; neutron scattering, lattice dynamics, and nuclear nonproliferation
      materials research.
  scope: |-
    Neutron and X-ray scattering provide powerful and indispensable tools for the study of materials. Scattering studies often yield insights into the structure and dynamics of materials that are not accessible by other means. This symposium solicits presentations covering emerging topics that utilize scattering techniques, including both neutron and x-ray scattering. The symposium will bring together researchers from the scattering and materials science communities to address how scattering techniques can be applied to current problems in materials science and engineering.

    Topics of interest include but are not limited to:
    1. Structure determination of complex systems
    2. Phonons, lattice thermal transport, lattice effects on stability, anharmonicity
    3. Magnetism, spin dynamics, magnons, and other collective excitations and their interactions
    4. Microstructure characterization and control
    5. Residual stress mapping and imaging in engineering components
    6. Phase transformation kinetics and fundamental issues of nucleation and growth
    7. Structure and property relationships in soft matter
    8. Neutron and X-ray instrument development and modeling
    9. Theory and modeling of scattering process and material response
- id: '012'
  title: Novel Strategies for Rapid Acquisition and Processing of Large Datasets From Advanced Characterization Techniques
  track: Advanced Characterization Methods
  flyer_url: https://www.tms.org/tms2027/downloads/flyers/TMS2027-CFA-Flyer-012.pdf
  division_sponsors:
  - TMS Structural Materials Division
  committee_sponsors:
  - 'TMS: Advanced Characterization, Testing, and Simulation Committee'
  organizers:
  - name: Sriram Vijayan
    affiliation: Michigan Technological University
    background: Assistant professor of materials science; in-situ TEM of thermally driven microstructure evolution, additive
      manufacturing, and nuclear fuels.
  - name: Rakesh Kamath
    affiliation: Argonne National Laboratory
    background: Researcher; high-energy synchrotron X-ray diffraction characterization of solidification texture and phase
      transformations in metal additive manufacturing.
  - name: Fan Zhang
    affiliation: National Institute of Standards and Technology
    background: NIST physicist; synchrotron X-ray scattering and in-situ characterization of additive manufacturing and materials
      kinetics.
  - name: Austin Mcdannald
    affiliation: National Institute of Standards and Technology
    background: Staff materials scientist; autonomous experimentation and physics-informed machine learning for materials,
      including autonomous neutron diffraction.
  - name: Sarshad Rommel
    affiliation: University of Connecticut
    background: Postdoctoral researcher; electron microscopy of additively manufactured aluminum alloys, electrocatalysts,
      and thermoelectric materials.
  scope: |-
    Quantification and correlation of microstructural data to material properties and process variables are key to the design of novel materials and optimization of advanced manufacturing processes. The investigation of the evolution of microstructural features (size, morphology, and chemistry) across different length and time scales in novel material systems and materials subject to advanced manufacturing processes demand the need for a thorough multiscale characterization approach, and typically results in large datasets. Recent developments in high- throughput and autonomous experimental approaches combined with advances in instrumentation, computational capabilities and analysis software have compounded the challenge of curating these large datasets. There is an imminent need for development of novel approaches/ strategies to extract high quality and actionable microstructural information from these datasets in a rapid and efficient manner. This symposium seeks to bring researchers from industry and academia alike interested in discussing these novel strategies on data obtained from a single or a combination of techniques, which include - optical microscopy (OM), scanning electron microscopy (SEM), scanning/transmission electron microscopy (S/TEM), neutron and synchrotron x-ray-based techniques, atom probe tomography (APT), and x-ray micro-computed tomography (XCT).

    Topics include, but are not limited to -
    •   High-throughput property or microstructural characterization methodologies that enable rapid discovery and/or improved design of novel material systems.
    •   Machine learning and AI guided real-time or post facto reduction of high-volume datasets acquired during in situ characterization studies of microstructure evolution.
    •   Challenges and opportunities related to curation, handling, access and storage of metadata/data from large characterization datasets and the adherence to FAIR data principles.
    •   Acceleration of feature extraction and quantification from large imaging (OIM, SEM, EBSD, S/TEM, radiography, tomography) spectroscopy and/or diffraction-based datasets through computer vision and/or machine learning workflows/packages.
    •   Workflows for on-the-fly data extraction and feedback for advanced manufacturing routes using in situ monitoring techniques.
