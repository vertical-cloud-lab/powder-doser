  - name: Zahra Ghanbari
    affiliation: Sandia National Laboratories
    background: Materials scientist; physical and joining metallurgy, tantalum alloy mechanical behavior, and electrical contact
      alloys.
  scope: |-
    Interstitial elements such as oxygen, hydrogen, carbon, and nitrogen play a pivotal role in metals and alloys. Their influence is multifaceted:
    they can enhance strength and ductility by altering the energy landscape, for example, through metastability-driven structural transformations that evolve under localized near-equilibrium thermodynamic conditions, yet they can also accelerate oxidation and induce embrittlement under certain conditions. These effects are especially critical in extreme environments and in processing routes that facilitate interstitial uptake, such as those involving melting, solidification, or powder feedstocks. Despite their importance, research on interstitial effects remains scattered across topics such as diffusion, metastability, precipitation, alloy design, embrittlement, radiation effects, and oxidation, leaving few opportunities for integrated discussion. Such fragmentation obscures their unifying role and limits collective progress. By bringing these efforts together, this symposium aims to raise awareness of interstitial phenomena and establish them as controllable factors whose beneficial and detrimental influences can be strategically leveraged or mitigated in next-generation materials.

    Key Topic(s) include, but are not limited to:
    •    Interstitial-metal interactions (including refractory alloys, multi-principal element alloys, steels, additively manufactured alloys, steels, light alloys and other advanced structural alloys) governing diffusion, metastability, precipitation, oxidation, and degradation mechanisms.
    •    Design strategies for controlling interstitials via gettering sites, coatings, and environmental processing.
    •    Processing-structure-property relationships in interstitial-bearing alloys.
    •    Metastability engineering and interstitial-driven phase transformations.
    •    In situ and operando studies of interstitial effects under stress, thermal, radiation, and environmental extremes.
    •    Modeling and simulation of interstitial effects, from atomic to continuum scales.
    •    Artificial intelligence and machine learning-enabled frameworks for predicting and analyzing interstitial behavior. Submissions focused primarily on irradiation-induced degradation, alloy development, or modeling framework creation should be submitted to the appropriate NMC symposium.
