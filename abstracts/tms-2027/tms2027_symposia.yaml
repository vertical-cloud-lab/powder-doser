  - name: Nutth Tuchinda
    affiliation: New Jersey Institute of Technology
    background: Assistant professor; atomistic and first-principles modeling of grain boundary segregation and defect thermodynamics
      for alloy design.
  - name: Rebecca Gallivan
    affiliation: Dartmouth College
    background: Assistant professor of engineering; nanoscale material mechanics and micro/nano-additive manufacturing of
      metals.
  - name: Wenwu Xu
    affiliation: San Diego State University
    background: Associate professor of mechanical engineering; multiscale computational modeling and microstructure characterization
      of structural and energy materials.
  - name: Ryan Sills
    affiliation: Rutgers University
    background: Assistant professor; discrete dislocation dynamics and multiscale modeling of plasticity, fracture, and hydrogen
      effects in metals.
  - name: Daniel Moore
    affiliation: Sandia National Laboratory
    background: Computational materials scientist; molecular dynamics of grain boundaries, interfaces, and additive manufacturing.
  - name: Sergii Divinskyi
    affiliation: University of Muenster
    background: Professor of materials physics; radiotracer grain boundary diffusion and interface phenomena in metals and
      high-entropy alloys.
  - name: Kaka Ma
    affiliation: Texas A&M University
    background: Associate professor; powder-based synthesis, field-assisted sintering, laser directed energy deposition, and
      materials for harsh environments.
  scope: |-
    A detailed understanding of interface phenomena is key to the development of advanced materials with tailored microstructures and optimal properties. While the broad importance of interfaces to materials science has long been recognized, recent advances in computational methods, characterization techniques, and their coupling with artificial intelligence have enabled new discoveries and elucidated insights into the elementary mechanisms by which interfaces form and evolve in response to a multitude of external stimuli. This symposium aims to bring together researchers with experimental and computational efforts aimed at gaining a fundamental understanding of materials interfaces, from thermodynamics to nonequilibrium phenomena. The symposium will consider various classes of interfaces, including grain boundaries, crystalline interphase boundaries, solid-liquid interfaces, and free surfaces in a whole spectrum of materials from pure substances to multi- component alloys and ceramics.

    Topics of choice for this symposium include but are not limited to:
    1. Interatomic potential development and its use to model interfacial properties.
    2. Advanced characterization techniques and their use in revealing interface structure.
    3. Fundamental mechanisms underpinning interfacial dynamics.
    4. Compositional effects on interface properties.
    5. Grain boundary structure-property relations.
    6. Solid-liquid interface properties and anisotropy.
    7. Interface thermodynamics and kinetics, phase transitions, and microstructure evolution (grain growth, solidification, recrystallization).
    8. Atomic structure and associated defects in interfaces.
