  scope: |-
    This symposium advances the fundamental understanding and industrial application of field-assisted material processing and solidification, where external fields, including electric, magnetic, acoustic (ultrasonic), electromagnetic (microwave/RF), photonic, particle-beam, plasma, electrochemical, mechanical, and gravitational (micro and super-gravity) fields, are utilized to modify transport, phase transformations, and interfacial chemistry. The symposium aims to foster interdisciplinary discussions and bridge the gap between fundamental phenomena, such as electromagnetic braking of fluid flow or cavitation-driven microstructure refinement, and scalable, energy-efficient manufacturing pathways. Contributions are sought that deliver validated multiphysics models and in situ diagnostics to link field parameters to microstructure and properties across metals and ceramics, spanning from traditional casting to additive manufacturing.

    Typical topics include but not limited to:
    •    Solidification in external fields: modification/control of growth kinetics, grain size and morphology, micro/macro segregation, and texture/orientation in metallic and ceramic systems.
    •    Electromagnetic (Magnetohydrodynamics): Electromagnetic braking, stirring, and convective heat and mass transport.
    •    Acoustic and ultrasonic assistance: Utilization of acoustic streaming and cavitation of micro-bubbles to drive flow and refine microstructures.
    •    Electromagnetic levitation and containerless processing: Levitation of highly reactive metals to measure key material properties and facilitate comparisons with microgravity experiments.
    •    Gravitational field engineering: Investigation of material behavior and density improvements under micro-gravity and strong super- gravitational conditions.
    •    Electric-field and current-assisted densification: Mechanisms and stability of SPS/FAST, flash sintering, and field-induced transport.
    •    Electromagnetic (microwave/RF) and photonic processing: Volumetric coupling, selective heating, and localized sintering using laser or flash lamp sources.
    •    Particle-beam and plasma-assisted processing: Irradiation-enhanced diffusion, defect engineering, and plasma-mediated surface activation.
    •    Field-assisted additive manufacturing: Integrating external fields into melt-based additive processes to control solidification pathways and material performance.
    •    Fundamental mechanisms and modeling: Elucidating thermal vs. athermal effects and delivering validated data-driven or multiphysics models of field-matter interactions.
    •    Scalable and energy-efficient manufacturing: Developing control strategies for industry-relevant processes and bridging fundamental research with industrial applications.
