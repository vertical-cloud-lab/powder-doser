    There is tremendous demand for multi-physics advances in the modeling and simulation of materials processing processes. As more physical phenomena are continuously included in modern computational fluid dynamics (CFD) methodologies, it is critical that these newly developed models are integrated and validated. This symposium seeks developments and applications in the general area of CFD modeling and simulation of materials processing processes. Papers are requested from researchers and engineers involved in the modeling of multiscale and multiphase phenomena in material processing systems. The symposium focuses on the CFD modeling and simulation of processes including continuous casting of alloys, macrosegregation, microsegregation, electromagnetic force induced braking & stirring (EMS & EMBr) , ultrasonic cavitation & stirred (UST) processing, controlled solidification processes, ingot casting, forging, welding, heat treating, and VAR/ESR/PAM/EBM remelting processes; manufacturing of advanced metal-matrix composites & nanocomposites via controlled melting & solidification processing, coatings including PVD, CVD, & plasma-assisted EBM-PVD technologies; and other surface and/or additive engineering processes including induction, ultrasonic, laser, and EB thermal processing. The symposium also deals with applications of CFD to engineering processes and demonstrates how CFD can help scientists and engineers to better understand the complexity of engineering processes.
