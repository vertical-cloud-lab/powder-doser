  scope: |-
    This symposium focuses on environmental degradation in advanced material systems, including high-temperature alloys, multi-principal element alloys (MPEAs), high-entropy alloys (HEAs), high-entropy ceramics (HECs), and advanced coatings. These materials are essential for applications in extreme environments such as aerospace propulsion, power generation, and industrial processing. As service conditions become increasingly aggressive, degradation phenomena—including oxidation, corrosion, hydrogen embrittlement, and complex environment-material interactions—pose significant challenges. Understanding these mechanisms is critical for predicting component lifetimes and enabling the design of next-generation materials. This symposium will provide a forum for researchers and engineers to discuss advances in experimental evaluation, multi-scale modeling, innovative mitigation strategies, novel coating architectures and data-driven materials design, for lifetime prediction. Emphasis will be placed on bridging experimental observations with computational predictions, linking environmental conditions to degradation mechanisms, and identifying microstructural features governing resistance. Contributions spanning fundamental studies, applied research, and industrial case analyses are encouraged. Contributions exploring in-situ monitoring, high-throughput testing, and correlative approaches are particularly encouraged. The session aims to integrate perspectives from academia, national laboratories, and industry to address current challenges and emerging opportunities.

    Themes of interest include, but are not limited to:
    •   Mechanisms of Environmental Attack: oxidation, corrosion (aqueous, high-temperature, molten salt, liquid metal), hydrogen effects and degradation, and radiation-assisted damage and cracking.
    •   Advanced Characterization: Correlative, multi-modal microscopy and spectroscopy.
    •   Multiscale Modeling & Computational Simulation: ICME, thermodynamic-kinetic modelling, multi-scale simulations of degradation processes.
    •   Testing Methodologies: In-situ monitoring, complex environment simulation (e.g., steam, supercritical CO2), high-throughput testing; coupled mechanical– environmental degradation (e.g. stress-corrosion cracking, corrosion fatigue).
    •   Microstructure–Property Relationships: phase stability, defect evolution, and degradation-induced property changes.
    •   Coatings & Surface Engineering: Novel coating architectures, diffusion barriers, and microstructural evolution during service.
    •   Alloy Design & Lifetime Prediction: Materials optimization strategies for enhancing environmental resistance, data-driven design, machine learning approaches, and physics-based models for remaining useful life assessment.
