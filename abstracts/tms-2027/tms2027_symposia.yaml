    background: Materials scientist and consultant; nuclear materials, corrosion, and advanced manufacturing of alloys.
  - name: Zhi Liang
    affiliation: National Institute of Standards and Technology
    background: NIST materials research engineer; CALPHAD thermodynamic/kinetic databases for alloy solidification, heat treatment,
      and additive manufacturing.
  - name: Ji-Cheng Zhao
    affiliation: University of Connecticut
    background: Professor and engineering dean; diffusion kinetics, thermodynamics, high-throughput experimentation, and computational
      alloy design.
  scope: |-
    Thermodynamics and kinetics provide the scientific foundation for alloy design by governing phase stability, diffusion, phase transformations, and microstructural evolution. While computational and data-driven tools continue to advance, reliable predictive capability depends fundamentally on high-quality experimental measurements and mechanistically grounded interpretation. Recent advances in in-situ and operando characterization, high-resolution microscopy, and advanced experimental techniques now enable direct, quantitative interrogation of thermodynamic stability and kinetic evolution across relevant length and time scales. These capabilities create timely opportunities to strengthen the experimental foundations that underpin thermodynamics- and kinetics-informed alloy development. This symposium focuses on rigorous, experimentally driven investigations of thermodynamic and kinetic phenomena in structural and functional alloys. Emphasis is placed on quantitative measurement, mechanistic insight, and systematic validation of phase stability, diffusion behavior, and transformation pathways. Contributions integrating experiments with modeling approaches are encouraged, particularly where experimental evidence provides critical validation and physical interpretation of predictive frameworks.

    Key Topic(s) include, but are not limited to:
    •    Experimental Determination of Thermodynamic and Kinetic Properties: Quantitative measurement of phase equilibria, thermodynamic and thermophysical properties, diffusion coefficients, and transformation kinetics in alloys, including both equilibrium and metastable conditions.
    •    Mechanistic Studies of Phase Transformations and Interfaces: Experimental investigations of nucleation and growth, solute partitioning, interfacial thermodynamics, segregation, grain boundary diffusion, and defect-mediated processes governing microstructural evolution under diverse processing pathways.
    •    Experimental–Model Integration and Validation: Mechanistically grounded studies in which experimental data enable parameter determination, model calibration, and physical interpretation of thermodynamic and kinetic frameworks (e.g., CALPHAD, diffusion simulations, phase-field approaches), with emphasis on systematic validation and quantitative assessment of predictive reliability.
    •    Advanced Characterization and Alloy Performance: Application of state-of-the-art synthesis methods, advanced microscopy and spectroscopy, in-situ characterization, and high-throughput experimental techniques to elucidate thermodynamic stability, kinetic mechanisms, and their impact on mechanical, thermal, magnetic, electronic, and functional performance.
    •    Accelerated and Data-Enabled Alloy Development: Data-driven strategies for rapid alloy discovery and optimization, including high- throughput experimentation, automated synthesis and characterization, and AI/ML-assisted workflows integrated with computational and experimental approaches. Emphasis on adaptive and closed-loop frameworks that accelerate identification of optimal compositions, microstructures, and processing pathways for targeted applications.
