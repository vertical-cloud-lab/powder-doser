  scope: |-
    The rising interest in additive manufacturing (AM) for refractory alloys has been fueled by the growing need for high-performance turbine engines, hypersonic technologies for both defense and commercial applications, space-based power systems, and nuclear propulsion for long-duration space missions. Traditional refractory alloy processing requires multiple steps and poses substantial challenges, but AM offers a promising alternative to efficiently produce near-net shaped parts. As a result, extensive research efforts are underway to advance metal AM processes for refractory alloys, including tungsten (W), molybdenum (Mo), tantalum (Ta), and niobium based alloys. However, new challenges have emerged due to the high melting points of these materials, their ductile-to-brittle transition temperatures, and their sensitivity to interstitial impurities, which can lead to poor material quality after printing. In particular, there are outstanding challenges in mitigating cracking, managing thermal loads during large-scale prints, and harnessing the unique microstructures facilitated by AM processes. This symposium will bring together a broad community of researchers and industry professionals to present their latest findings, accomplishments, and obstacles, while providing a comprehensive overview of the current state of the field and the advancements needed to drive progress.

    Topics of interest include, but are not limited to:
    •   Cracking mechanisms associated with solidification and low ductility in refractory alloys during AM
    •   Interactions between solidification structures, impurity segregation, crystallographic formations, and defect generation in AM refractory alloys
    •   Alloy design strategies for improving both printability and performance
    •   Advances in powder feedstock development for refractory metals in AM
    •   Modeling efforts to better understand AM processes
    •   Development and evaluation of key AM components for refractory alloys~%& Techniques for joining AM-produced components and their properties
- id: '005'
  title: Designing Complex Microstructures Through Additive Manufacturing
  track: Additive Manufacturing
  flyer_url: https://www.tms.org/tms2027/downloads/flyers/TMS2027-CFA-Flyer-005.pdf
  division_sponsors:
  - ORGANIZING COMMITTEE TMS Materials Processing and Manufacturing Division
  committee_sponsors:
  - '•    Peter Collins, Iowa State University TMS: Additive Manufacturing Committee'
  - 'TMS: Integrated Computational Materials Engineering Committee •    Matteo Seita, University of Cambridge •    Gianna
    Valentino, University of Maryland •    Ian McCue, Northwestern University •    Rebecca Gallivan, Dartmouth College •    Alain
    Reiser, KTH Royal Institute of Technology •    Wendy Gu, Stanford University'
  organizers:
  - name: Matteo Seita
    affiliation: University of Cambridge
    background: Associate professor; microstructure engineering in metal additive manufacturing and optical crystallographic
      characterization.
  - name: Gianna Valentino
    affiliation: University of Maryland
    background: Assistant professor of materials science; additive manufacturing and mechanical behavior of refractory alloys
      and structural materials.
  - name: Peter Collins
    affiliation: Iowa State University
    background: Professor of materials science; physical metallurgy, additive manufacturing of titanium alloys, and microstructure
      quantification across length scales.
  - name: Ian McCue
    affiliation: Northwestern University
    background: Assistant professor of materials science; additive manufacturing of refractory alloys and nanostructured metals
      for extreme environments.
  - name: Rebecca Gallivan
    affiliation: Dartmouth College
    background: Assistant professor of engineering; nanoscale material mechanics and micro/nano-additive manufacturing of
      metals.
  - name: Alain Reiser
    affiliation: KTH Royal Institute of Technology
    background: Assistant professor of materials science; microscale metal additive manufacturing and high-strain-rate micromechanics
      of alloys.
  - name: Wendy Gu
    affiliation: Stanford University
    background: Mechanical engineering professor; nanomechanics and 3D-printed lightweight architected materials and nanostructured
      alloys.
  scope: |-
    Additive manufacturing (AM) offers unparalleled freedom to manipulate the microstructure, composition, and properties of metal alloys site- specifically through complex multi-variable, multi-physics, and multi-scale processes. Fusion-based AM technologies have dominated this field so far, enabling fine control of solidification microstructures at high spatial resolution by tailoring melt pool dynamics and thermal histories in 3D. Solid-state and hybrid AM processes further expand this capability by combining mechanical treatments and different forming strategies to directly impact microstructures and composition during fabrication. Emerging electrochemical processes open additional pathways for precision control of materials at the nano- to mesoscale with location-specific functionality. The breadth of this processing space gives rise to a wide range of complex, non-equilibrium, and spatially heterogeneous microstructures that are unique to AM. This richness presents exciting opportunities to engineer materials with spatially tailored properties within a single component, achieving unparalleled performance for frontier engineering applications in energy, aerospace and defense, transportation, space, and nuclear fusion. However, these opportunities are accompanied by significant challenges. Predicting and designing optimal material behavior remains difficult due to limited understanding of microstructure formation and property development during far-from-equilibrium processing, particularly across spatial microstructural transitions, as well as microstructural stability during service under extreme thermomechanical and environmental conditions. The lack of transferable, physics-based processing–structure– property relationships that capture this complexity efficiently across length scales continues to hinder the design of these complex materials. This symposium aims to bring together experts in materials processing, manufacturing, characterization, modeling, and design to address these challenges and identify pathways to harness the microstructural complexity enabled by AM. Emphasis will be placed on fundamental and applied studies that advance understanding of processing–structure–property linkages, microstructural stability, interface evolution, and data-driven or computationally assisted design strategies.

    Topics of interest include, but are not limited to:
    •   Compositional and microstructural control in metal AM, including site-specific, hierarchical, heterogeneous, and/or spatially graded
    •   Novel AM and hybrid processing strategies for microstructure and property gradient control
    •   Nanostructured materials and nanoscale design of microstructures in AM
    •   Fundamental studies of processing–structure–property relationships in AM materials with spatial heterogeneity
    •   Accelerated design space mapping and rapid identification of process-structure-property relationships in materials with complex and spatially varying microstructures made by AM
    •   Stability and evolution of AM microstructures and interfaces during post-processing and service
    •   Mechanical behavior and environmental degradation of AM materials with complex and spatially varying microstructures under extreme conditions
    •   Computational, experimental, and data-driven approaches for computer-aided AM and accelerated design of complex tailored
- id: '006'
  title: Advanced Characterization Techniques for Quantifying and Modeling Deformation
  track: Advanced Characterization Methods
  flyer_url: https://www.tms.org/tms2027/downloads/flyers/TMS2027-CFA-Flyer-006.pdf
  division_sponsors:
  - TMS Structural Materials Division
  - TMS Extraction and Processing Division
  committee_sponsors:
  - 'TMS: Advanced Characterization, Testing, and Simulation Committee'
  - 'TMS: Materials Characterization Committee'
  organizers:
  - name: Cem Tasan
    affiliation: Massachusetts Institute of Technology
    background: Professor of metallurgy; in-situ characterization of deformation and damage micromechanisms, design of damage-resistant
      steels and alloys.
  - name: Irene Beyerlein
    affiliation: University of California, Santa Barbara
    background: Professor; computational modeling of deformation, crystal plasticity, and interface-driven mechanics in polycrystalline
      metals and composites.
  - name: Milan Heczko
    affiliation: Institute of Physics of Materials, Czech Academy of Sciences
    background: Senior staff scientist; transmission electron microscopy of deformation, fatigue, and damage mechanisms in
      high-temperature alloys and steels.
  - name: Wolfgang Pantleon
    affiliation: Technical University of Denmark
    background: Associate professor; deformation microstructures, dislocation structures, texture, and thermal stability characterized
      by diffraction techniques.
  - name: Hi Vo
    affiliation: Los Alamos National Laboratory
    background: Scientist; irradiation and corrosion effects on advanced materials for nuclear reactor applications.
  scope: |-
    Advances in characterization technology have greatly improved our ability to quantify deformation mechanisms such as dislocation motion, twinning, and stress-induced phase transformations, and the microstructural changes accompanying deformation such as texture evolution, grain morphology changes, dislocation accumulation and localized strain. A variety of relatively new techniques are being applied to both structural and functional materials. In combination with modeling, these techniques improve our understanding of deformation and failure during material processing/forming and under normal or extreme conditions in service. In situ techniques, especially, are providing an enhanced understanding of individual mechanisms, their interactions, and the direct validation of simulations from computational materials science models. This gathering offers a venue to discuss and share new advances in current techniques or new technique development or in pairing with algorithms or simulations as they apply to deformation behavior.

    Areas of interest include, but are not limited to:
    1. Improving the understanding of deformation mechanisms in structural or functional materials – elasticity, dislocation plasticity, mechanically-induced twinning or phase transformations, damage and fracture
    2. Advances in characterization techniques: X-ray-based techniques, electron-based techniques (including HR-(S)TEM, EBSD, HR-EBSD, ECCI, PED), scanning probe microscopy techniques, and others – in particular in-situ
    3. Advances in materials deformation modeling– with specific emphasis on the integration with advanced characterization techniques.
