      and corrosion.
  - name: Nicholas Fassino
    affiliation: OKLO, Inc.
    background: Fuel performance engineer; multiphysics modeling of metallic fast-reactor fuels, including recycled and transuranic-bearing
      fuels.
  scope: |-
    The consortium of Seaborg Institutes within the U.S. DOE national laboratory system has the common purpose of advancing the study of actinide science for nuclear research and stimulating the development of early career professionals. Advancing our understanding of the basic science of the actinide elements and their compounds is the primary goal of the Seaborg Institutes. The topical areas include, but are not limited to, fundamental actinide physics and chemistry directed at understanding f-electron behavior, fabrication and engineering of metallic actinides, nuclear fuel cycle and actinide separation science, nuclear forensics, and actinide radiochemistry. This symposium will feature emerging topics in actinide research with a focus on the materials science and physics of actinide systems by highlighting recent discoveries and advances from the international community on actinide research relevant to the Seaborg Institutes.

    Topics of interest include but are not limited to:
    •   Fundamental chemistry and physics of the actinides and actinide systems.
    •   Fabrication and engineering of metallic actinides.
    •   Materials science of actinide bearing materials.
    •   Advanced characterization of actinide metals and alloys.
    •   Magnetic and electronic properties of actinides and actinide materials, including fundamentals of f-electron interactions and quantum phenomena (theory and experiments).
    •   Preparation and purification of actinide elements and compounds
    •   Forensic identification and detection of actinide species
    •   New actinide materials and their applications

    This symposium will not include work focused on fuel performance, qualification, or irradiation testing. Submissions focused on those topics should be submitted to ‘Advances in Understanding Nuclear Fuel and Cladding Behavior and Performance for Extreme Environments
- id: '103'
  title: Spectroscopic Methods and Analysis for Nuclear Energy Related Materials
  track: Nuclear Materials
  flyer_url: https://www.tms.org/tms2027/downloads/flyers/TMS2027-CFA-Flyer-103.pdf
  division_sponsors:
  - TMS Structural Materials Division
  committee_sponsors:
  - 'TMS: Nuclear Materials Committee'
  - 'TMS: Advanced Characterization, Testing, and Simulation Committee'
  organizers:
  - name: Scarlett Widgeon Paisner
    affiliation: Los Alamos National Laboratory
    background: Scientist; solid-state NMR and spectroscopic characterization of nuclear fuels and ceramics, thermophysical
      property measurement.
  - name: Arjen van Veelen
    affiliation: Los Alamos National Laboratory
    background: Staff scientist; synchrotron X-ray spectroscopy of actinides, nuclear fuels, and nuclear forensics.
  - name: Xiaofeng Guo
    affiliation: Washington State University
    background: Associate professor of chemistry; thermodynamics and calorimetry of actinide and rare-earth materials for
      nuclear applications.
  - name: Dong (Lilly) Liu
    affiliation: University of Oxford
    background: Associate professor of engineering science; micromechanics and fracture of nuclear graphite, composites, and
      materials in extreme environments.
  - name: Sabyasachi Sen
    affiliation: University of California, Davis
    background: Professor; structure, dynamics, and properties of glasses and amorphous materials via NMR and other spectroscopic
      methods.
  - name: Sayandev Chatterjee
    affiliation: TerraPower LLC
    background: R&D chemistry senior manager; radiochemistry, molten salts, and medical isotope production for advanced nuclear
      energy.
  scope: |-
    Nuclear materials in nuclear energy applications are exposed to extreme environments during irradiation, such as high temperatures, corrosive environments, and high mechanical stress. High demanding environments such as these, require detailed understanding of the microstructure as well as short-range and long-range order, and diffusion, before and after exposure to these extreme environments to predict the lifetime and performance during operation. This symposium focuses on method development for such techniques to study these features, as well as advanced characterization to tease out the above mentioned phenomena. This can also include the application of advanced techniques that are readily used in other fields but have not yet been applied to the nuclear energy field. Spectroscopic techniques, in general, can elucidate structural phenomena (e.g., defects) and kinetic processes that allows insight into the structure-properties-performance relationships and help guiding future materials fabrication and processing efforts. With the development of advanced spectroscopic methods, together with novel extreme technologies, numerous exciting opportunities are emerging for nuclear materials research at extremes. We envision this symposium to highlight investigations resulting from but not limited to synchrotron X-ray absorption spectroscopy (XAS), X-ray emission spectroscopy (XES), synchrotron X-ray/neutron diffraction, nuclear magnetic resonance, positron annihilation spectroscopy, Raman spectroscopy, ultrasonic spectroscopy, mass spectroscopy, etc., are encouraged.

    Specific topics of interest include:
    •   Defect chemistry and analysis
    •   Diffusion
    •   Correlation of short and long-range order
    •   Phase transition
    •   Impurity analysis
    •   Dopant chemistry
    •   Corrosion chemistry Please note that abstracts that focus on the material development aspect should be submitted to “Developments in Advanced Nuclear Structural Materials” or “Fuels” symposia.
- id: '104'
  title: Transmutation Effects in Materials in Fission, Fusion, and Spallation Environments
  track: Nuclear Materials
  flyer_url: https://www.tms.org/tms2027/downloads/flyers/TMS2027-CFA-Flyer-104.pdf
  division_sponsors:
  - TMS Structural Materials Division
  committee_sponsors:
  - 'TMS: Nuclear Materials Committee'
  organizers:
  - name: Timothy Lach
    affiliation: Oak Ridge National Laboratory
    background: R&D staff scientist; electron microscopy and atom probe tomography of irradiated nuclear materials for fission,
      fusion, and spallation.
  - name: Eric Lang
    affiliation: University Of New Mexico
    background: Assistant professor of nuclear engineering; plasma-material interactions, ion irradiation of tungsten, and
      fusion-relevant materials characterization.
  - name: Weicheng Zhong
    affiliation: Oak Ridge National Laboratory
    background: R&D staff scientist; fusion and fission materials, hydrogen isotope retention and permeation, electron microscopy
      of irradiated alloys.
  - name: Daniel Clark
    affiliation: Type One Energy Group Inc.
    background: Senior materials scientist at stellarator fusion company; breeder blanket, first wall, and tritium fuel cycle
      engineering.
  - name: Arunodaya Bhattacharya
    affiliation: University of Birmingham
    background: Associate professor; radiation damage in fusion and fission structural materials via advanced electron microscopy
      and ion irradiation.
  - name: Benjamin Beeler
    affiliation: North Carolina State University
    background: Associate professor of nuclear engineering; atomistic and multiscale modeling of nuclear fuels and irradiation
      effects.
  scope: |-
    Structural materials in nuclear fission and fusion reactors and high-energy beamlines like spallation neutron sources are subjected to neutron irradiation, which induces a wide range of microstructural changes, from knock-on damage to transmutation reactions. While knock-on damage is well known to produce nanoscale defects such as dislocation loops, precipitates, and cavities, less is known about the effects of transmutation-induced products, including transmutation gases, which are particularly felt in fusion and spallation applications, which have a high transmutation rate. Understanding these effects is fundamental to delivering materials for fusion energy concepts, advanced fission reactors, and component lifetime extension and design of new beamline target and spallation neutron source applications. This symposium is bringing together experts who are conducting state-of-the-art investigations and developing technologies to understand and simulate the effect of transmutation products for future validation with 14 MeV neutrons using fission neutrons, spallation neutron sources, and accelerator- based energetic ions. Investigations are strongly encouraged which involve neutron irradiation, innovative techniques to experimentally simulate transmutation effects, and novel facilities to study transmutation-related damage situations, especially under the application of thermo-mechanical stresses. This symposium also calls for modeling studies related to transmutation product radiation damage, evolution, and inventory build-up.

    Contributions exploring transmutation effects specifically in nuclear fuels should be submitted to the “Advances in Understanding Nuclear Fuel Behavior and Performance for Extreme Environments” symposium, and contributions related to joints or welds should be directed to the “Special Topics in Nuclear” symposium.

    The topics of interest include the following key aspects:
    •    Effects of transmutation helium, hydrogen, and other gas buildup, and solid transmutation effects (such as W to Re and Os)
    •    Thermo-mechanical properties testing, transmutation gas diffusivity and permeability testing, computational modeling and simulation, and advanced microstructural characterization
    •    Materials of interest include but are not limited to fusion structural materials and plasma facing materials, solid breeder materials, and structural materials in high energy beamlines and fission reactors
    •    Synergistic transmutation and radiation damage in structural and functional materials, including under applied stress and thermal gradients
    •    Novel experiments using existing facilities to evaluate neutron energy spectrum transmutation effects
    •    Industry experience in transmutation product buildup and impacts on long-term operation/regulatory approval
- id: '105'
  title: Accelerating Innovation in Materials and Manufacturing
  track: Special Topics
  flyer_url: https://www.tms.org/tms2027/downloads/flyers/TMS2027-CFA-Flyer-105.pdf
  division_sponsors:
  - TMS Extraction and Processing Division
  - TMS Materials Processing and Manufacturing Division
  committee_sponsors:
  - 'TMS: Process Technology and Modeling Committee'
  organizers:
  - name: Zachary Cordero
    affiliation: Massachusetts Institute of Technology
    background: Associate professor of aeronautics; additive manufacturing and powder processing of high-temperature structural
      materials for aerospace.
  - name: Douglas Hofmann
    affiliation: NASA Jet Propulsion Laboratory
    background: Principal scientist; bulk metallic glasses and metal additive manufacturing for extreme-environment spacecraft
      hardware.
  scope: |-
    Almost all sectors of the economy are undergoing dramatic change driven by several macro-trends, including the rise of artificial intelligence, the diversification and security of global supply chains, and the rapid growth of disruptive markets such as electric vehicles, space commercialization, renewable energy, and data infrastructure. Materials engineering is both undergoing transformation and playing a central role in enabling and accelerating these shifts. In this symposium, leaders from industry, the investment community, academia, and government will discuss how they are navigating and driving innovation in this period of rapid change.

    The one-day program will be organized into four thematic sessions, each of which will feature invited talks followed by moderated panel discussions to encourage cross-sector dialogue. Sessions will address the evolving landscape of materials innovation, critical materials and supply chain resilience, emerging approaches to accelerated materials development, and manufacturing and commercialization pathways. A midday pitch competition, held during lunch, will feature short presentations from students, postdoctoral researchers, and early-career professionals. This competition is designed to highlight emerging ideas and engage the next generation of materials innovators. By integrating technical advances with perspectives on commercialization and supply chains, this symposium provides a practical, forward-looking view of

    Technical / Thematic Focus Areas
    •   Translation of materials research into commercial products
    •   Startup-driven innovation in materials and manufacturing
    •   Scale-up challenges: from lab to pilot to production
    •   Advanced manufacturing and digital production systems
    •   Critical materials and supply chain strategy
    •   Materials for EVs, energy, space, and semiconductor applications
    •   Qualification, certification, and adoption barriers
    •   Role of capital and investment in materials innovation
    •   Industry–academia–government collaboration models
    •   Emerging tools for accelerating materials development
- id: '106'
  title: Bladesmithing 2027
  track: Special Topics
  flyer_url: https://www.tms.org/tms2027/downloads/flyers/TMS2027-CFA-Flyer-106.pdf
  division_sponsors:
  - TMS Materials Processing and Manufacturing Division
  committee_sponsors:
  - 'TMS: Shaping and Forming Committee'
  organizers:
  - name: Tarik Saleh
    affiliation: Los Alamos National Laboratory
    background: Deputy division leader in materials science; mechanical testing and characterization of irradiated nuclear
      materials.
  - name: Samuel Wagstaff
    affiliation: Oculatus Consulting
    background: Aluminum process and product consultant; DC casting, melt processing, recycling, and decarbonization in the
      aluminum industry.
  scope: |-
    The Bladesmithing at TMS program brings key metallurgical concepts to life for university students. The TMS Bladesmithing Competition, held every other year at the TMS Annual Meeting & Exhibition, challenges student teams from around the world to produce a blade by hand hammering or trip hammer forging. In alternate years, the Bladesmithing Symposium allows students to present their current work on bladesmithing topics.

    This symposium gives students a chance to discuss bladesmithing processes and procedures, to report their findings from previous experience, and to learn from fellow competitors. You can present work associated with or inspired by previous TMS Bladesmithing Competitions or discuss new entries. Submissions from students, student teams, and professionals with bladesmithing experience are welcome.

    While presenters are not permitted to bring actual blades to the conference, safe metallurgical samples are allowed and encouraged. To participate, please submit the title of your presentation and a brief abstract (150 words or less describing historical background, blade material, processing steps, characterization performed, etc.). The abstract submitter can enter the names of co-authors and their affiliations when completing the abstract form. Please be sure to designate the presenter if someone other than the submitter.
