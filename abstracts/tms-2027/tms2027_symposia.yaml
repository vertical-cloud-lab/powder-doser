    Cold spray is a solid-state layer-by-layer deposition of accelerated microparticles through a de Laval nozzle toward a substrate or previously deposited particles. Since its discovery, interest in cold spray technology has grown significantly, as it offers a potentially greener manufacturing alternative amid recent stringent environmental regulations. Cold spray continues to gain widespread traction across several industries, including aerospace, energy, military, and biomedical, and continued efforts to optimize processes and powders are necessary to support anticipated expansion beyond traditional applications. Exploring the structure-property relationships of materials deposited via cold spray and related technologies, as well as their practical industrial applications.

    Topics will include, but not limited to:
    1. Experimental, theoretical, and computational studies on cold spray process, and other solid-state additive manufacturing processes
    2. Effect of processing and feedstock parameters on bonding
    3. Powder development and optimization
    4. Microstructural evolution and evaluation of high-speed microparticle impact
    5. Mechanical and deteriorative (including corrosion and irradiation) response of cold-sprayed components
    6. Cold spray-induced residual stress-state and its effects on component performance
    7. Industrial applications of cold spray (performance, repair, product efficiency, and sustainability)
