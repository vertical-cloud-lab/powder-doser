    The use of molten salts as a coolant in molten salt reactors (MSR) and concentrating solar power (CSP) systems offers many advantages including low operating pressures, high temperatures, and favorable heat transfer. Molten salts are also widely used in the metal processing and nuclear fuels reprocessing industries. Despite the advantages, the highly aggressive molten salts present a challenging environment for salt facing materials. This symposium covers all aspects of materials science, chemistry, and electrochemistry in molten salt systems for diverse purposes such as energy transfer, energy storage, metallurgical processing, and actinide recovery.

