    background: Professor, Institute of Physics; bulk metallic glasses, relaxation dynamics, and structure-property relationships
      in amorphous materials.
  - name: A. Lindsay Greer
    affiliation: University of Cambridge
    background: Professor of materials science; metallic glasses, crystal nucleation, microstructural kinetics, and grain
      refinement in solidification.
  - name: Yue Fan
    affiliation: University of Michigan
    background: Associate professor of mechanical engineering; atomistic modeling of metallic glasses, defects, and materials
      in extreme environments.
  scope: |-
    Rapidly undercooling metallic liquids can bypass crystallization and lead to the formation of metals that lack atomic long-range order, commonly referred to as metallic glasses. The characterization of structure, how it changes over time and with temperature, how it governs glass forming ability and crystallization, and how it determines mechanical behavior and physical properties, remains a major challenge. This symposium provides a platform to discuss the recent progress made on this front, and how this knowledge can be harnessed to design new metallic glass materials for advanced structural and functional applications. The Structure-Property Relationships of Bulk Metallic Glasses symposium brings together a broad range of materials researchers for a technical exchange and a discussion of the scientific issues driving research in this field.

    The topics of interest include:
    •    Structure across length-scales and its link to properties
    •    Stability, relaxation and dynamics, and crystallization
    •    Glass-forming ability and the glass transition
    •    Mechanical behavior and physical properties
    •    Novel alloys, processing, and manufacturing methods
    •    New approaches to modeling, machine learning, and accelerated discovery
    •    Pathways towards new commercially relevant alloys and industrial applications.

    The symposium will emphasize experimental, computational, theoretical aspects of the structure and dynamics in metallic glasses and aims to highlight practical applications.
