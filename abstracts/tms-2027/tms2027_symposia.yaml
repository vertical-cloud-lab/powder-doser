  - name: Jeffrey Sowards
    affiliation: NASA Marshall Space Flight Center
    background: Welding metallurgist; welding and additive manufacturing of aerospace and refractory alloys for propulsion
      applications.
  scope: |-
    With the upcoming transition to one or more commercially driven space stations to replace the International Space Station, the push for Lunar and Mars colonization, the recently launched NASA-DOE program to develop Lunar surface reactor by 2030, and many other initiatives, there is a need for a forum at TMS to address some key materials and manufacturing aspects of the space economy. There is increasing interest in creating new materials in the radiation/microgravity environment of low-earth orbit with properties that cannot be produced on Earth. Also, in low-earth orbit, there is a need to repair and repurpose existing assets and build structures that are too big to be launched, such as massive solar arrays, requiring the transformation of traditional materials processing and manufacturing methods so they can be used to build complex systems in microgravity or other celestial bodies.

    This symposium will be a global discussion of:
    a.) The synthesis and characterization of new materials created in low-earth orbit, with potential commercial products ranging from pharmaceuticals to semiconductors
    b.) The effects of the space environment (vacuum, atomic oxygen, radiation, extreme temperatures) on structural and functional materials
    c.) An assessment of the current state and future need for transforming traditional manufacturing technologies so they can be used in space.

    Session Topics:
    1. Commercial Space – challenges and opportunities
    2. Advanced materials synthesis in low-earth orbit, the moon, and Mars.
    3. Space environment effects on materials
    4. Autonomous/robotic manufacturing for space applications
    5. Manufacturing processes (welding, forming, additive, and others) in space
    6. Building large structures in space
    7. Workforce development for commercial material/manufacturing in space
    8. Biological Applications
- id: '071'
  title: Materials Science for Global Human Flourishing
  track: Materials Synthesis and Processing
  flyer_url: https://www.tms.org/tms2027/downloads/flyers/TMS2027-CFA-Flyer-071.pdf
  division_sponsors: null
  committee_sponsors:
  - 'TMS: Education Committee'
  organizers:
  - name: Garritt Tucker
    affiliation: Baylor University
    background: Professor of mechanical engineering; atomistic modeling of defects, grain boundaries, and deformation in nanostructured
      metals.
  - name: Austin Smith
    affiliation: Baylor University
    background: Mechanical engineering researcher; micromechanics of carbon-fiber polymer-matrix composites for aerospace
      applications.
  - name: Spencer Seeley
    affiliation: Baylor University
    background: Materials science PhD student; molecular dynamics simulation of nanoscale defect physics.
  - name: Abdullah Akib
    affiliation: Baylor University
    background: Graduate researcher in materials science; nanoindentation and crystal plasticity finite-element modeling of
      titanium alloy mechanical behavior.
  - name: Mamta Silwal
    affiliation: Baylor University
    background: Materials science doctoral researcher affiliated with Baylor's Point-of-Need Innovations Center.
  scope: |-
    Materials Science and Engineering sits at the foundation of nearly every grand challenge facing society, from sustainable energy and resilient infrastructure to advanced healthcare, secure manufacturing, and equitable access to technology. As the global pressures of climate change, resource scarcity, population growth, and geopolitical instability intensify, there is an urgent need to re-examine how materials research, innovation, and deployment can intentionally support global human flourishing. This symposium brings together invited leaders from academia, industry, and national laboratories to explore how materials innovation can be aligned with societal well-being, economic resilience, and environmental stewardship. The session will highlight emerging materials strategies that prioritize sustainability, circularity, reliability, and scalability, while also addressing ethical considerations and workforce development. Emphasis will be placed on translational pathways that connect fundamental discovery to real-world impact on societal well-being, human health, and general quality of life. By fostering interdisciplinary dialogue and student engagement, this symposium aims to articulate a forward-looking vision for materials science as a discipline enabling a more resilient, responsible, and thriving global society.

    Topics will include:
    •   Sustainable and circular materials systems targeted at conserving resources and reducing waste from the outset, including approaches that enable reuse, repair, recycling, and benign end-of-life outcomes.
    •   Infrastructure materials that enable climate-resilient, low-carbon systems through reductions in embodied carbon, enhanced durability, and adaptive performance, mitigating the environmental impacts of continued large-scale human development.
    •   Novel materials that enable high-efficiency, reliable energy generation, storage, and utilization by controlling structure-property relationships, minimizing energy loss and supporting scalability in an increasingly electrified world.
    •   Biomaterial advances in bioactivity, biocompatibility, minimization, and sensitivity to optimize human health, thereby improving therapeutic outcomes, continuous and non-invasive biosensing, and rapid, point-of-care diagnostic platforms.
    •   Future-focused manufacturing to enhance resilience, reliability, and security of global supply chains.
    •   Data-driven and AI-enabled approaches that accelerate material discovery, optimization, and deployment by linking data, computation, experiment, and manufacturing processes.
    •   Ethical frameworks and policy considerations that guide responsible materials development, use, and access across global society.
    •   Education and workforce development strategies that prepare the next generation of materials scientists and engineers to address societal challenges.
- id: '072'
  title: 'Nanocomposite Materials: Innovations in Design, Fabrication, and Applications'
  track: Materials Synthesis and Processing
  flyer_url: https://www.tms.org/tms2027/downloads/flyers/TMS2027-CFA-Flyer-072.pdf
  division_sponsors:
  - TMS Structural Materials Division
  committee_sponsors:
  - 'TMS: Composite Materials Committee'
  organizers:
  - name: Simona Hunyadi Murph
    affiliation: Savannah River National Laboratory
    background: Principal scientist; nanoengineered materials and nanotechnology for energy, sensing, and national security
      applications.
  - name: Aikaterini Bellou
    affiliation: Clarkson University
    background: Assistant professor of mechanical and aerospace engineering; nanocomposite thin films and metal/ceramic multi-nanolayered
      coatings, microstructure-property relationships.
  - name: Kai Li
    affiliation: Oak Ridge National Laboratory
    background: R&D staff scientist; biocomposites, gas-separation materials, additively manufactured heat exchangers, and
      ultraconductive composites.
  scope: |-
    Nanocomposite materials are emerging as pivotal solutions to a wide array of global challenges due to their ability to achieve exceptional physical, mechanical, and multifunctional properties through nanoscale engineering. The design, fabrication, and implementation of nanostructured composites remain at the forefront of innovation across research and industry. This symposium aims to unite experts from academia, industry, and national laboratories to explore cutting-edge advancements and opportunities in nanocomposites. Discussions will focus on scalable manufacturing approaches and innovative processing methods to develop cost-effective, high-performance, and sustainable materials for diverse real-world applications.

    This symposium will encompass the following focus areas:
    •    Scalable fabrication techniques for nanocomposites, including additive manufacturing and hybrid nanoscale designs.
    •    Energy applications, including high-energy-density batteries, fuel cells, supercapacitors, and advanced energy-harvesting devices.
    •    Healthcare applications, such as biocompatible systems, drug delivery technologies, and implantable medical materials.
    •    Environmental sustainability, ranging from water purification and pollution remediation to waste management technologies.
    •    Aerospace and automotive applications, emphasizing lightweight, ultra-durable, and adaptable materials for enhanced performance and efficiency.
    •    Advanced construction and infrastructure materials, including self-healing, corrosion-resistant, and high-strength composites.
    •    Next-generation electronics, focusing on flexible displays, wearable electronics, high-conductivity conductors, and precision sensors.
    •    Innovative characterization tools and modeling techniques for elucidating the structure-property relationships of nanocomposites.
    •    Challenges in transitioning lab-scale innovations to industrial-scale production and commercialization.

    This symposium invites interdisciplinary contributions to accelerate the advancement and adoption of nanocomposite materials as a cornerstone of modern material science and engineering. By fostering collaboration between researchers and practitioners, the event will highlight transformative innovations and address challenges associated with scaling and integration.
