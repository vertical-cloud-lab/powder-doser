  scope: |-
    Titanium and its alloy systems have large tonnage commercial usage for varied sensitive and safety-critical engineering applications like aerospace systems, gas-turbines, cryogenic structural applications, ballistic shield components, orthopedic implants, etc. Such a diverse range firmly rests upon the detailed understanding of the underlying composition-processing-structure-property (CPSP) relationships, based on extensive research spanning over the last sixty years. This signature symposium aims to deliberate upon some of these issues and to serve as a global forum for scientists, engineers, and technologists from industry, academia, and research laboratories. The symposium covers all aspects of physical and mechanical metallurgy of titanium and titanium alloys including novel processing techniques, recent product development, new alloy design approaches, microstructure exploration, and performance evaluation.

    The topics of choice include, but are not limited to:
    •    Titanium and titanium alloys, including near alpha alloys, α+β alloys, metastable β alloys, intermetallic alloys, titanium aluminides, and titanium matrix composites.
    •    Alloy design approaches to novel commercial applications.
    •    Processing of titanium and titanium alloys using advanced techniques.
    •    Additive manufacturing of titanium-based alloys and their structure-property relationships
    •    Phase transformations and microstructural evolution in titanium and titanium alloys.
    •    Dynamic mechanical properties under high strain rate deformation.
    •    Microscopic deformation mechanisms at various temperatures and loading conditions.
    •    Elucidating CPSP relationships and/or understanding phase transformations using modeling and simulation.
