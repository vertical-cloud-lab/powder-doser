  scope: |-
    Biomaterials have been widely utilized in a variety of biomedical applications, such as tissue engineering and regenerative medicine, due to their inherent physical and chemical properties including biocompatibility, tunable mechanical properties and biodegradability, and hierarchical internal structures. Additive manufacturing, based on layer-by-layer fabrication mechanism, possesses critical advantages in fabrication of 3D structures of biomaterials for various biomedical applications, including complex geometries, heterogeneity, porosities, and incorporation of different growth factors. Typical 3D printing techniques used for biomaterials include inkjet printing, microextrusion, laser-assisted printing, stereolithography, to name a few. The most common biomaterials used in 3D printing are ceramics, polymers, and composites. The post- printing properties and microstructures are of great importance to the biomaterial functionality, such as mechanical properties, physical properties including swelling and degradation properties, pore size and porosity. In addition, with the unique structural characteristics and tunable properties, porous materials play an important role in drug delivery systems, antimicrobial applications, to name a few. The symposium combines advance in biomaterials for 3D printing of scaffolds and tissues, and advance in porous materials for biomedical applications.

    Specific topics of interest include, but are not limited to:
    •   Design, fabrication and characterization of 3D scaffolds
    •   Characterization of post-printing properties of biomaterials
    •   Antimicrobial applications
    •   Bioink rheological properties and printability
    •   Modeling and simulation of biomaterial properties
    •   Fabrication of biomaterials-based heterogeneous structures
    •   Novel biomaterials and 3D printing techniques for scaffold fabrication
    •   Bioprinting of cellular structures and tissues
    •   Cell-biomaterial interaction
    •   Drug delivery systems
    •   Theranostic platforms
    •   Organ-on-chips
