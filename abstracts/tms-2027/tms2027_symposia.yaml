  scope: |-
    Biological materials science involves the application of materials science and engineering principles to the study of biological materials, including the design, synthesis, and fabrication of materials systems from biological lessons. The Symposium on Biological Materials Science, the legacy symposium created by the Biomaterials Committee, emphasizes biogenic materials as well as their role in the development of bioinspired materials. Biological materials exhibit a fascinating breadth and complexity. Biological materials are formed under ambient conditions by living and adaptive biological systems for multifunctional performance. The structure and properties of biological materials are typically hierarchical, inhomogeneous, and anisotropic. Therefore, biological materials exhibit complex structure-property relationships which are only beginning to be elucidated. Bioinspired materials have unique, tailored structures and properties designed based on the study of structure-property relationships in biological materials. Bioinspired materials most often utilize creative new methods of synthesis/processing and microstructure design in order to achieve the desired functionality.

    The symposium will encompass the following themes:
    • Biological and natural materials (hard and soft tissues)
    • Bioinspired materials
    • Bioenabled materials and systems
