  scope: |-
    This symposium features novel methods and new discoveries for understanding all aspects of fatigue across a broad range of material systems, including (but not limited to) metals and alloys, ceramics, composites, polymers, and other emerging materials. It brings together scientists and engineers from all over the world to present their latest work on current issues in: characterizing and simulating fatigue damage; identifying microstructural weak links; enhancing fatigue strength and resistance; reporting on quantitative relationships among processing, microstructure, environment, and fatigue properties; and providing methods to perform life predictions. This symposium further provides a platform for fostering new ideas about fatigue at multiple scales and in multiple environments, numerically, theoretically, and experimentally. The symposium organizers plan to build on the highly successful and well-attended symposia over the last several years, and special consideration will be given to speakers and abstracts from industry. The proposed 2027 TMS symposium will be provisionally organized into seven topical areas, roughly one per session. Throughout the seven sessions, there will be an estimated 60 oral presentations, with 3-5 of those being invited/keynote presentations on relevant topics. Researchers who achieved new findings in fundamental and industrial fatigue topics will be given the opportunity to deliver an invited talk. Additionally, a poster session will be held to supplement the oral presentations and to encourage student involvement.

    Topics of interest may include (but are not limited to):
    •   Predictive methods for fatigue properties. For instance, digital twin approaches; data-driven, data-centric and high-throughput methods; multiscale modeling approaches.
    •   Advanced experimental characterization of microstructurally driven fatigue behavior. For instance, emerging characterization methods; multi-modal, correlative and 3D measurements.
    •   Fatigue deformation processes. For instance, damage initiation, crack propagation, and plastic localization.
    •   Fatigue properties in extreme environments. For instance, fatigue properties of novel alloys for extreme environments; fatigue properties at high or cryogenic temperatures; very/ultra-high cycle fatigue.
    •   Fatigue of non-metallic materials. For instance, carbon fiber composites, cementitious and construction materials, ceramics, semiconductor materials up to full chips and packaging, and polymeric materials systems, including resins and other 3D printed polymers.
    •   Industry-focused fatigue studies. For instance, qualification/certification and manufacturability, translating lab-scale results to coupon/ component-scale behavior, enabling inspection strategies and life-management decisions, and performing root-cause analysis
    •   Microstructure-based fatigue studies of additively manufactured materials.
