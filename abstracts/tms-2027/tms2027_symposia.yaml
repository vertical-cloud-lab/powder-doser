  organizers:
  - name: Matthew Steiner
    affiliation: University of Cincinnati
    background: Associate professor; neutron and X-ray diffraction, texture, phase transformations, nuclear materials, and
      tetrataenite magnets.
  - name: Sophie Primig
    affiliation: University of New South Wales
    background: Professor of physical metallurgy; thermomechanical processing, recrystallization, and atom probe characterization
      of steels and superalloys.
  - name: Gregory Thompson
    affiliation: University of Alabama
    background: Professor; atom probe and electron microscopy of phase transformations in thin films, refractory alloys, and
      ceramics.
  - name: Rakesh Kamath
    affiliation: Argonne National Laboratory
    background: Researcher; high-energy synchrotron X-ray diffraction characterization of solidification texture and phase
      transformations in metal additive manufacturing.
  - name: Abhishek Sharma
    affiliation: Worcester Polytechnic Institute
    background: Materials researcher; titanium and high-entropy alloys, additive manufacturing, phase transformations, and
      deformation mechanisms.
  scope: |-
    Minor alloying additions, intentional or otherwise, can play an outsized role in both phase stability and transformation kinetics. We encourage submissions on all material systems that exhibit such effects, defining dilute as approximately < 3 at%.

    Examples include but not limited to:
    1. Elemental additions that alter the nucleation behavior, promoting or inhibiting nuclei, changing their density and location, or otherwise altering the transformation pathway through the formation of intermediary phases or other mechanisms
    2. Additions that alter the available diffusion pathways and rates of key species within the material
    3. Additions that change the degree or type of chemical ordering
    4. Additions that impact the interfacial energy of one phase in relation to another, such as altering the stacking fault energy, to promote or inhibit a phase transformation
    5. Additions that impact martensitic or strain induced transformations, including those governing shape memory alloy behavior
