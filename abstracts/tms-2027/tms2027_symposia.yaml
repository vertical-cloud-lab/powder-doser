  scope: |-
    Harnessing phase transformations is one of the most effective and versatile approaches for designing and controlling microstructures in materials across a broad range of structural and functional applications. This symposium continues a longstanding series of annual TMS symposia dedicated to phase transformations and microstructural evolution occurring during materials processing as well as under service and extreme operating conditions. The objective of the symposium is to critically assess the current state of knowledge, identify emerging trends, and highlight new opportunities in the understanding and controlling phase transformations and microstructural evolution.

    Topics of interest include, but are not limited to:
    1. Fundamental phenomena and mechanisms of phase transformations, encompassing solidification, solid-state transformations, and both diffusion-controlled and diffusionless processes.
    2. Experimental investigation and modeling of microstructure produced and evolved associated with phase transformation in materials, including ferrous alloys and non-ferrous alloys, ceramics, semiconductors, and other advanced material systems.
    3. Engineering and tailoring phase transformation pathways (e.g., strength-toughening synergy, shape memory effects, precipitation processes) to enable advanced structural, functional and energy-related applications.
    4. Controlling phase transformations and microstructure during advanced materials processing and harnessing these phenomena to tailor materials behavior and performance in extreme environments (e.g., high temperature, high strain rate, shock loading, complex state of stress, irradiation, or chemical exposure).
    5. Development and application of advanced or high-throughput experimental methods to interrogate phase transformations and microstructural evolution under service-relevant conditions, integrated with modeling and simulations for mechanistic understanding.
