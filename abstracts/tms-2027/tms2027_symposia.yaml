  committee_sponsors:
  - 'TMS: Additive Manufacturing Committee'
  - 'TMS: Computational Materials Science and Engineering Committee'
  - 'TMS: Process Technology and Modeling Committee'
  organizers:
  - name: Sreenivas Raguraman
    affiliation: Johns Hopkins University
    background: PhD researcher; biodegradable magnesium alloys, corrosion, and machine learning-assisted microstructure-property
      relationships.
  - name: Maitreyee Sharma Priyadarshini
    affiliation: Virginia Tech
    background: Assistant professor of aerospace engineering; machine learning for materials discovery, atomistic simulation,
      and hypersonic flow modeling.
  - name: Timothy Weihs
