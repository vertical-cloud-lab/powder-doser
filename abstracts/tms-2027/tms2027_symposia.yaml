    This symposium will cover extraction of critical minerals with a focus on critical and rare metals, from both conventional and unconventional feedstocks. Unconventional feedstocks include waste materials and residues, recycling of critical elements, tailings, and extraction processing byproducts resultant from metal production. The critical minerals and rare metals of interest include antimony, bismuth, barium, beryllium, boron, calcium, chromium, gallium, germanium, hafnium, indium, lithium, magnesium, manganese, molybdenum, niobium, platinum group metals, rare earth metals, rhenium, scandium, selenium, silicon, sodium, strontium, tantalum, tellurium, tungsten, and other elements not covered by other TMS symposia. Critical element extraction and processing topics will span bio-, hydro-, and electro-metallurgy for recovering rare metals from both conventional and unconventional feedstocks (e.g., residues, recycled materials, tailings, and metal production process streams). Novel processes such as biomimicking leaching and separation, externally stimulated separations (e.g., electric, magnetic, ultrasonic), in-situ recovery, solar-thermal reaction synthesis, novel electrochemical separations, and cold crucible synthesis of rare metals will be considered. Processing and refining studies for critical minerals and rare metals spanning laboratory, pilot-scale, and industrial applications will be included.

